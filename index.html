<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0c0e16" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="LustuZone" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>LustuZone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #2f6bff;
    --accent2: #00d4ff;
    --grad: linear-gradient(135deg, #2f6bff, #00d4ff);
    --glow: radial-gradient(circle, rgba(47,107,255,0.35), transparent 70%);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #07080d; overflow-x: hidden; }
  body {
    position: relative;
    font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #e8e8ee;
    padding-bottom: calc(92px + env(safe-area-inset-bottom));
    min-height: 100vh;
  }
  #app {
    max-width: 100%;
    padding: 12px;
    background-image: linear-gradient(180deg, rgba(7,8,13,0.28), rgba(7,8,13,0.42)), url('bg-app.jpg');
    background-size: 100% auto;
    background-position: top center;
    background-repeat: repeat-y;
  }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-top: env(safe-area-inset-top); }
  .header img { height: 44px; border-radius: 11px; }
  .header .title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -0.2px; }
  .header .subtitle { font-size: 12px; color: #5a6b8c; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
  .header.home-header img { height: 52px; border-radius: 13px; }
  .header.home-header .title { font-size: 19px; }
  .header.home-header .subtitle { font-size: 11px; }
  .header .spacer { flex: 1; }
  .logout-link { font-size: 11px; color: #5a6b8c; text-decoration: underline; cursor: pointer; }
  .badge { font-size: 9px; padding: 2px 8px; border-radius: 8px; background: #1a1f30; color: var(--accent); border: 1px solid #243049; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }

  .avatar-wrap { position: relative; }
  .avatar-btn { width: 46px; height: 46px; border-radius: 14px; background: var(--grad); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; cursor: pointer; transition: transform 0.12s; flex-shrink: 0; }
  .avatar-btn:active, .avatar-btn.tap-active { transform: scale(0.92); }
  .avatar-menu { position: absolute; top: 46px; right: 0; background: #11141f; border: 1px solid rgba(47,107,255,0.28); border-radius: 14px; padding: 10px; min-width: 200px; z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .avatar-menu-name { font-size: 15px; font-weight: 800; color: #fff; padding: 4px 6px 2px; }
  .avatar-menu-role { margin: 0 6px 8px; }
  .avatar-menu-item { padding: 13px 8px; font-size: 15px; font-weight: 700; color: #c3ccde; cursor: pointer; border-top: 1px solid #1a2030; transition: background 0.12s; border-radius: 8px; }
  .avatar-menu-item:hover, .avatar-menu-item.tap-active { background: #1a1f30; }
  .avatar-menu-item.disabled { color: #5a6b8c; cursor: default; }
  .avatar-menu-item.disabled:hover, .avatar-menu-item.disabled.tap-active { background: transparent; }
  .avatar-menu-item.danger { color: #ff5a5a; }

  .bottom-nav { position: fixed; bottom: 10px; left: 10px; right: 10px; background: #11141f; border: 1px solid #1c2333; border-radius: 22px; display: flex; padding: 10px 6px calc(10px + env(safe-area-inset-bottom)); z-index: 50; box-shadow: 0 8px 30px rgba(0,0,0,0.45); }
  .bottom-nav button, .bottom-nav .bn-select-wrap { flex: 1; min-width: 0; }
  .bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #5a6b8c; font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.3px; padding: 6px 2px; cursor: pointer; transition: transform 0.12s, color 0.15s; }
  .bottom-nav button:active, .bottom-nav button.tap-active { transform: scale(0.9); }
  .bottom-nav button.active { color: var(--accent); }
  .bottom-nav button.active svg { filter: drop-shadow(0 0 6px rgba(47,107,255,0.6)); }
  .bottom-nav svg { width: 24px; height: 24px; }
  .bn-select-wrap { position: relative; display: flex; flex-direction: column; align-items: center; }
  .bn-select-wrap svg { width: 24px; height: 24px; color: #5a6b8c; margin-bottom: 4px; pointer-events: none; }
  .bn-select-wrap.active svg { color: var(--accent); filter: drop-shadow(0 0 6px rgba(47,107,255,0.6)); }
  .bn-select-trigger { display: flex; flex-direction: column; align-items: center; background: none; border: none; padding: 0; cursor: pointer; font-family: 'Archivo', sans-serif; width: 100%; }
  .bn-select-label { font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.3px; color: #5a6b8c; pointer-events: none; }
  .bn-select-wrap.active .bn-select-label { color: var(--accent); }
  .bn-extra-menu { position: absolute; bottom: 100%; right: -8px; margin-bottom: 12px; background: #11141f; border: 1px solid rgba(47,107,255,0.28); border-radius: 14px; padding: 10px; min-width: 170px; z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .avatar-menu-item.active { color: var(--accent2); }

  select, input { font-size: 15px; padding: 10px; border-radius: 10px; border: 1px solid #1c2333; background: #11141f; color: #e8e8ee; width: 100%; font-family: 'Archivo', sans-serif; color-scheme: dark; }
  select:focus, input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  input[type="date"], input[type="time"] { padding: 9px 10px; height: 44px; }
  table { border-collapse: collapse; width: 100%; font-size: 11px; }
  th, td { border: 1px solid #1c2333; padding: 5px 4px; text-align: center; white-space: nowrap; color: #c3ccde; }
  th { background: #151827; color: #fff; position: sticky; top: 0; z-index: 5; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; font-size: 10px; }
  td.action-name, th.action-name { text-align: left; min-width: 150px; font-weight: 600; background: #11141f; color: #e8e8ee; }
  tr.total-row td { font-weight: 800; background: #1a1710; color: #ffd23f; }
  .cell-euro { font-size: 9px; color: #ff7849; margin-top: 1px; font-weight: 600; }
  .table-wrap { overflow-x: auto; max-height: 70vh; -webkit-overflow-scrolling: touch; border-radius: 14px; border: 1px solid rgba(47,107,255,0.28); }

  .card { background: #11141f; border: 1px solid rgba(47,107,255,0.28); border-radius: 16px; padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
  .big-number { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
  .big-number.green { color: #33d17a; }
  .big-number.red { color: #ff5a5a; }
  .muted { color: #7a8aad; font-size: 12px; font-weight: 500; }
  .row-flex { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .pill { display: inline-block; padding: 6px 12px; border-radius: 20px; background: #1a1f30; color: #ff8a5c; font-size: 11px; margin: 3px; border: 1px solid #2a2340; font-weight: 600; }

  .btn { padding: 12px 14px; border-radius: 12px; border: none; background: var(--grad); color: #fff; cursor: pointer; font-size: 13px; font-weight: 800; width: 100%; font-family: 'Archivo', sans-serif; text-transform: uppercase; letter-spacing: 0.3px; transition: transform 0.12s, filter 0.15s; }
  .btn:active, .btn.tap-active { transform: scale(0.96); filter: brightness(0.92); }
  .btn.secondary { background: #1a1f30; color: #7a8aad; border: 1px solid #243049; }

  .status-bar { font-size: 10px; padding: 8px 10px; border-radius: 10px; margin-bottom: 10px; text-align: center; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .status-online { background: rgba(51,209,122,0.1); color: #33d17a; border: 1px solid rgba(51,209,122,0.25); }
  .status-offline { background: rgba(255,90,90,0.1); color: #ff5a5a; border: 1px solid rgba(255,90,90,0.25); }

  .entry-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #1a2030; }
  .entry-row:last-child { border-bottom: none; }
  .entry-name { flex: 1; font-size: 13px; color: #e8e8ee; font-weight: 600; }
  .entry-value { font-size: 11px; color: #5a6b8c; margin-top: 2px; }
  .entry-select { width: 76px; flex-shrink: 0; }

  .cn-hero { text-align: center; background: linear-gradient(160deg, rgba(47,107,255,0.16), rgba(0,212,255,0.06)); border: 1px solid rgba(47,107,255,0.4); border-radius: 20px; padding: 22px 16px; margin-bottom: 14px; box-shadow: 0 0 30px rgba(47,107,255,0.12), inset 0 0 24px rgba(0,212,255,0.05); }
  .cn-hero-label { font-size: 12px; color: #9db3e0; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
  .cn-hero-value { font-size: 46px; font-weight: 900; color: #fff; letter-spacing: -1.2px; text-shadow: 0 0 24px rgba(0,212,255,0.45); }
  .cn-add-btn { margin-bottom: 14px; }
  .cn-card { padding: 15px 16px; }
  .cn-row { display: flex; align-items: flex-start; gap: 12px; }
  .cn-avatar { width: 42px; height: 42px; border-radius: 12px; background: var(--grad); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .cn-info { flex: 1; min-width: 0; }
  .cn-name-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .cn-name { font-size: 14px; font-weight: 700; color: #fff; }
  .cn-amount { font-size: 15px; font-weight: 900; color: #ff7849; flex-shrink: 0; }
  .cn-actions { font-size: 11px; color: #7a8aad; margin-top: 3px; font-weight: 600; line-height: 1.6; }
  .cn-actions.muted { color: #4a5670; font-style: italic; }
  .cn-bubbles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
  .cn-bubble { display: inline-flex; align-items: center; gap: 5px; background: #1a1f30; border: 1px solid #243049; color: #c3ccde; font-size: 10.5px; font-weight: 700; padding: 5px 10px; border-radius: 20px; white-space: nowrap; }
  .cn-bubble-val { color: #ff8a5c; font-weight: 800; }
  .cn-bubble-more { color: var(--accent2); border-color: rgba(0,212,255,0.35); background: rgba(0,212,255,0.08); cursor: pointer; }
  .cn-toggle-detail { text-align: center; font-size: 11px; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 12px 0 4px; cursor: pointer; text-decoration: underline; }
  .add-btn-primary { margin-bottom: 14px; }
  .qty-stepper { display: flex; align-items: center; justify-content: center; gap: 18px; padding: 6px 0 2px; }
  .qty-btn { width: 44px; height: 44px; border-radius: 12px; border: 1px solid #1c2333; background: #11141f; color: #fff; font-size: 20px; font-weight: 800; cursor: pointer; font-family: 'Archivo', sans-serif; transition: transform 0.12s, background 0.15s; flex-shrink: 0; }
  .qty-btn:active, .qty-btn.tap-active { transform: scale(0.92); background: var(--grad); }
  .qty-value { min-width: 48px; text-align: center; font-size: 24px; font-weight: 900; color: #fff; }

  .presence-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #1a2030; }
  .presence-row:last-child { border-bottom: none; }
  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn { padding: 9px 15px; border-radius: 10px; border: 1px solid #1c2333; background: #11141f; color: #7a8aad; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Archivo', sans-serif; transition: transform 0.12s, background 0.15s; }
  .toggle-btn:active, .toggle-btn.tap-active { transform: scale(0.94); }
  .toggle-btn.present { background: #1a7a3f; color: #fff; border-color: #1a7a3f; }
  .toggle-btn.absent { background: #b33; color: #fff; border-color: #b33; }

  .login-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 85vh;
    padding: 16px;
    background-image: linear-gradient(180deg, rgba(7,8,13,0.28), rgba(7,8,13,0.42)), url('bg-app.jpg');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
  }
  .login-card-outer { border-radius: 26px; padding: 2px; background: var(--grad); width: 100%; }
  @media (min-width: 700px) {
    .login-card-outer { max-width: 360px; }
  }
  .login-card { background: #11141fee; backdrop-filter: blur(6px); border: 1px solid rgba(47,107,255,0.28); border-radius: 24px; padding: 36px 26px; text-align: center; position: relative; overflow: hidden; }
  .login-card .login-glow { position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; background: var(--glow); }
  .login-card img { height: 168px; margin-bottom: 16px; border-radius: 30px; position: relative; box-shadow: 0 10px 40px rgba(47,107,255,0.35); }
  .login-card .login-title { font-size: 32px; font-weight: 900; color: #fff; letter-spacing: -0.6px; margin-bottom: 6px; position: relative; }
  .login-card .login-subtitle { font-size: 13px; color: #7a8aad; text-transform: uppercase; letter-spacing: 1.4px; font-weight: 700; margin-bottom: 10px; position: relative; }
  .login-error { color: #ff5a5a; font-size: 13px; margin-top: 10px; font-weight: 600; }
  .login-card .field-label { font-size: 13px; }
  .login-card select, .login-card input { font-size: 17px; padding: 13px; }
  .field-label { display: block; text-align: left; margin: 12px 0 5px; font-size: 11px; color: #5a6b8c; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  .paiement-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #1a2030; font-size: 12px; color: #c3ccde; }

  .section-h { font-size: 11px; font-weight: 800; color: #fff; margin: 6px 2px 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 7px; }
  .section-h::before { content: ""; width: 14px; height: 3px; background: var(--accent); border-radius: 2px; }

  #app { border: 1px solid rgba(0,212,255,0.28); border-radius: 20px; animation: appShimmer 3.2s ease-in-out infinite; }

  body.login-mode { padding-bottom: 0; }
  body.login-mode #app { min-height: 100vh; display: flex; flex-direction: column; }
  body.login-mode .login-wrap { flex: 1; min-height: 0; }

  @keyframes appShimmer {
    0%, 100% { border-color: rgba(0,212,255,0.16); box-shadow: 0 0 14px rgba(0,212,255,0.08); }
    50% { border-color: rgba(0,212,255,0.42); box-shadow: 0 0 22px rgba(0,212,255,0.2); }
  }

  @media (min-width: 700px) {
    body { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
    #app { max-width: 820px; margin: 24px auto 0; padding: 26px; border-radius: 26px; animation: none; border: 1px solid rgba(0,212,255,0.35); box-shadow: 0 0 50px rgba(47,107,255,0.14), inset 0 0 30px rgba(0,212,255,0.04); }
    .bottom-nav { left: 50%; right: auto; transform: translateX(-50%); width: min(820px, calc(100% - 24px)); }
    .card, .add-form { padding: 20px; }
    .header img { height: 50px; }
    .header .title { font-size: 19px; }
    .header .subtitle { font-size: 13px; }
    .big-number { font-size: 36px; }
    .nc-title { font-size: 21px; }
    .nc-meta { font-size: 12px; }
    .ev-card { padding: 16px; }
    .ev-day { font-size: 25px; }
    .ev-month { font-size: 11px; }
    .ev-title { font-size: 14px; }
    .ev-date-full { font-size: 13px; }
    .ev-meta { font-size: 12px; }
    .entry-name { font-size: 14px; }
    .bottom-nav button { font-size: 11.5px; }
    .bottom-nav svg, .bn-select-wrap svg { width: 26px; height: 26px; }
  }

  .ev-card { display: flex; gap: 12px; background: #11141f; border: 1px solid rgba(47,107,255,0.28); border-radius: 14px; padding: 13px; margin-bottom: 9px; align-items: center; }
  .news-card { background: #11141f; border: 1px solid rgba(47,107,255,0.28); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .news-title { font-size: 14px; font-weight: 700; color: #fff; margin: 8px 0 4px; }
  .news-body { font-size: 12px; color: #b9c4dd; line-height: 1.5; white-space: pre-wrap; }

  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: #7a8aad; font-weight: 700; margin-bottom: 14px; flex-wrap: wrap; }
  .breadcrumb .crumb { cursor: pointer; }
  .breadcrumb .crumb.active { color: var(--accent2); cursor: default; }
  .breadcrumb .sep { color: #3a4666; }
  .folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
  .folder-card { background: #11141fee; border: 1px solid rgba(47,107,255,0.28); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; position: relative; }
  .folder-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(47,107,255,0.18); display: flex; align-items: center; justify-content: center; }
  .folder-icon svg { width: 19px; height: 19px; color: var(--accent2); }
  .folder-name { font-size: 12px; font-weight: 700; color: #fff; word-break: break-word; }
  .folder-del { position: absolute; top: 8px; right: 8px; }
  .file-row { display: flex; align-items: center; gap: 11px; background: #11141fee; border: 1px solid rgba(47,107,255,0.22); border-radius: 13px; padding: 11px; margin-bottom: 8px; }
  .file-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .file-icon svg { width: 18px; height: 18px; }
  .file-icon.video { background: rgba(255,90,90,0.18); color: #ff6b6b; }
  .file-icon.image { background: rgba(0,212,255,0.18); color: #00d4ff; }
  .file-icon.docx { background: rgba(47,107,255,0.18); color: #5b8bff; }
  .file-icon.pptx { background: rgba(255,140,60,0.18); color: #ff8c3c; }
  .file-icon.xlsx { background: rgba(51,209,122,0.18); color: #33d17a; }
  .file-icon.pdf { background: rgba(255,90,90,0.18); color: #ff6161; }
  .file-icon.file { background: rgba(154,166,196,0.18); color: #9aa6c4; }
  .file-icon.link { background: rgba(154,166,196,0.18); color: #9aa6c4; }
  .file-info { flex: 1; min-width: 0; cursor: pointer; }
  .file-title { font-size: 12.5px; font-weight: 700; color: #fff; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 9.5px; color: #7a8aad; font-weight: 600; }
  .file-badge { font-size: 8.5px; font-weight: 800; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; background: #1a1f30; color: #9db3e0; flex-shrink: 0; }
  .file-badge.inline { background: rgba(51,209,122,0.15); color: #33d17a; }
  .salaries-type-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .salaries-type-btn { flex: 1; text-align: center; padding: 9px 6px; border-radius: 10px; border: 1px solid #232a3f; background: #11141f; color: #7a8aad; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-family: inherit; }
  .salaries-type-btn.active { background: var(--grad); color: #fff; border-color: transparent; }
  .modal-overlay { position: fixed; inset: 0; background: #05060af5; display: flex; flex-direction: column; padding: 16px; z-index: 90; }
  .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .modal-close { width: 32px; height: 32px; border-radius: 9px; background: #1a1f30; display: flex; align-items: center; justify-content: center; color: #c3ccde; font-size: 16px; flex-shrink: 0; cursor: pointer; }
  .modal-title { font-size: 14px; font-weight: 800; color: #fff; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal-preview { flex: 1; background: #000; border-radius: 14px; overflow: hidden; }
  .modal-preview iframe { width: 100%; height: 100%; border: none; }
  .ev-date { text-align: center; flex-shrink: 0; width: 46px; }
  .ev-day { font-size: 22px; font-weight: 900; color: #fff; line-height: 1; }
  .ev-month { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 700; margin-top: 3px; }
  .ev-divider { width: 1px; align-self: stretch; background: #1c2333; }
  .ev-info { flex: 1; min-width: 0; }
  .ev-type { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 12px; display: inline-block; margin-bottom: 5px; }
  .ev-type.match { background: rgba(47,107,255,0.15); color: var(--accent); }
  .ev-type.entrainement { background: rgba(120,200,80,0.15); color: #78c850; }
  .ev-type.repas { background: rgba(255,180,60,0.15); color: #ffb43c; }

<body>
<div id="app">Chargement...</div>

<script src="google-script-config.js"></script>
<script>

const ACTIONS = [
  ["participation mensuelle", 5],
  ["Retard entraînement 1 min", 1],
  ["Retard entraînement 5 min", 2],
  ["Retard entraînement 10 min ou +", 5],
  ["Absence non justifié à l'entrainement", 10],
  ["Retard match", 5],
  ["Oubli tenu de match", 8],
  ["Absence non justifié au match", 50],
  ["Oubli de chasuble", 3],
  ["Oubli de vêtement hors chasuble", 5],
  ["Taxer une serviette de douche", 3],
  ["Taxer du savon", 1],
  ["Taxer de la crème", 0.5],
  ["Carton Rouge direct", 10],
  ["Carton rouge / Exclusion 2min répétée", 5],
  ["2min pour avoir râler", 2],
  ["Carton bleu", 15],
  ["Pas de logo BISCHO pour le déplacement", 2],
  ["Ballon dégueulasse (vraiment !)", 5],
  ["Oubli du ballon (match / entrainement)", 4],
  ["Taxer de l'eau", 2],
  ["Pas présent repas après match domicile", 5],
  ["Ne prend pas sa douche en déplacement", 10],
  ["Nom dans le journal", 2],
  ["Photo dans le journal", 4],
  ["Pire action du match (+ déguisement)", 1],
  ["Ballon dans la tête", 2],
  ["Autre (à préciser)", 1],
];

const PLAYERS = ["Thomas L.","JM B.","Hugo R.","Yann N.","Arnaud H.","Victor S.","Romain J.","Volodia M.","Victor P.","Mattéo MP.","Gabriel W.","Basil L.","Brahim I.","Maximilien M.","Arthur M.","Damien P.","Alexis W.","Mathieu S.","Nicolas Z.","Robin S."];
const TEAMS = ["SM1", "U17", "SM2"];

const LOGO_DATA_URI = "icon-512.png";
const SESSION_KEY = "caisse-noire-session"; // {nom, role, code, equipe}
const APP_VERSION_KEY = "caisse-noire-app-version";
const APP_VERSION = "2026-07-05-03"; // À incrémenter à chaque mise à jour déployée
const SEASON_START = new Date(2026, 8, 1);  // 1er septembre 2026
const SEASON_END = new Date(2027, 5, 30);   // 30 juin 2027

let grid = {};
let comptes = []; // [[nom, role, code, equipe, personne, poste, nomComplet, photoUrl], ...] (+ header row)
let presences = {}; // { "YYYY-MM-DD_Nom": "1"/"0" }
let paiements = []; // [[id, joueur, montant, date, commentaire], ...]
let evenements = []; // [[id, date, heure, type, titre, lieu, equipe], ...]
let presenceEvenements = {}; // { eventId_nom: "Oui"/"Non" }
let presenceJustifications = {}; // { eventId_nom: "texte du motif" }
let actualites = []; // [[id, titre, scope, texte, auteur, date], ...] (+ header row)
let salariesState = { loading: false, loaded: false, error: null, currentFolder: null, folders: [], files: [], breadcrumb: [] };
let salariesCache = {}; // folderId -> {folders, files, currentFolder} — permet un affichage instantané en revenant sur un dossier déjà visité

let session = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
if (session && !session.code) { session = null; localStorage.removeItem(SESSION_KEY); }

// Si une nouvelle version de l'appli a été déployée, on déconnecte tout le monde
// pour garantir que chacun recharge bien la dernière version et ses dernières données
if (localStorage.getItem(APP_VERSION_KEY) !== APP_VERSION) {
  session = null;
  localStorage.removeItem(SESSION_KEY);
  localStorage.setItem(APP_VERSION_KEY, APP_VERSION);
}
let currentPage = "home";
let isOnline = false;
let loginError = "";
let loginNeedsSetup = null; // null = pas encore vérifié, true/false ensuite
let loginSelectedNom = "";
let loginNoms = null; // [{nom, role}, ...] chargé avant connexion, remplace la liste figée PLAYERS pour le menu
let showAddEvent = false;

// ---------- Données ----------

function initGrid() {
  const g = {};
  PLAYERS.forEach(p => {
    g[p] = {};
    ACTIONS.forEach((a, i) => { g[p][i] = i === 0 ? 10 : 0; });
  });
  return g;
}

function parseSheetData(rows) {
  const g = {};
  PLAYERS.forEach((p) => { g[p] = {}; });
  for (let i = 0; i < ACTIONS.length; i++) {
    const sheetRow = rows[i + 1];
    if (!sheetRow) continue;
    PLAYERS.forEach((p, pIndex) => {
      const val = sheetRow[pIndex + 2];
      g[p][i] = (typeof val === "number") ? val : (parseInt(val, 10) || 0);
    });
  }
  return g;
}

function parsePresences(rows) {
  const p = {};
  for (let i = 1; i < rows.length; i++) {
    const [date, joueur, present] = rows[i];
    if (!date) continue;
    const d = (date instanceof Date) ? formatDateKey(date) : String(date).slice(0, 10);
    p[`${d}_${joueur}`] = String(present);
  }
  return p;
}

function parsePresenceEvenements(rows) {
  const p = {};
  const j = {};
  for (let i = 1; i < rows.length; i++) {
    const [eventId, nom, present, justification] = rows[i];
    if (!eventId) continue;
    p[`${eventId}_${nom}`] = String(present);
    if (justification) j[`${eventId}_${nom}`] = String(justification);
  }
  return { p, j };
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function isFormOpen() {
  return !!showAddEvent || !!window.__editingEvenementId || !!window.__editingPaiementId || !!window.__showAddPaiement || !!window.__showChangeCode || !!window.__showGenerateTrainings || !!window.__profilPosteAdding || (window.__profilPosteEditIndex !== null && window.__profilPosteEditIndex !== undefined) || !!window.__showAddActualite || !!window.__cnEditPlayer || !!window.__showSalariesAdd || !!window.__salariesPreviewFile || !!window.__salariesUploading;
}

async function fetchAll() {
  try {
    const res = await fetch(GOOGLE_SCRIPT_URL + "?action=getAll");
    if (!res.ok) throw new Error("bad response");
    const data = await res.json();
    grid = parseSheetData(data.grid);
    comptes = data.comptes || [];
    presences = parsePresences(data.presences || []);
    paiements = (data.paiements || []).slice(1);
    evenements = (data.evenements || []).slice(1).filter(r => r[0]);
    actualites = (data.actualites || []).slice(1).filter(r => r[0]);
    const parsedPE = parsePresenceEvenements(data.presenceEvenements || []);
    presenceEvenements = parsedPE.p;
    presenceJustifications = parsedPE.j;
    isOnline = true;
  } catch (err) {
    isOnline = false;
  }
  // Ne pas reconstruire l'affichage si un formulaire de saisie est ouvert
  // (évite d'interrompre un sélecteur de date/heure natif en cours d'utilisation)
  if (!isFormOpen()) render();
}

function startPolling() {
  fetchAll();
  setInterval(fetchAll, 8000);
}

async function writeCell(player, actionIndex, value) {
  grid[player][actionIndex] = value;
  render();
  const playerIndex = PLAYERS.indexOf(player);
  const row = parseInt(actionIndex, 10) + 2;
  const col = playerIndex + 3;
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=set&row=${row}&col=${col}&value=${value}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    isOnline = true;
  } catch (err) { isOnline = false; }
  render();
}

async function writePresence(dateKey, joueur, present) {
  presences[`${dateKey}_${joueur}`] = present ? "Oui" : "Non";
  render();
  try {
    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=setPresence&date=${dateKey}&joueur=${encodeURIComponent(joueur)}&present=${present ? "Oui" : "Non"}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    const data = await res.json();
    if (!data.ok) { await fetchAll(); return; }
    isOnline = true;
  } catch (err) { isOnline = false; }
  render();
}

async function addPaiement(joueur, montant, commentaire) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=addPaiement&joueur=${encodeURIComponent(joueur)}&montant=${montant}&commentaire=${encodeURIComponent(commentaire || "")}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    await fetchAll();
  } catch (err) { isOnline = false; render(); }
}

async function updatePaiementApi(id, joueur, montant, commentaire) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=updatePaiement&id=${encodeURIComponent(id)}&joueur=${encodeURIComponent(joueur)}&montant=${montant}&commentaire=${encodeURIComponent(commentaire || "")}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    window.__editingPaiementId = null;
    await fetchAll();
  } catch (err) { isOnline = false; render(); }
}

async function deletePaiementApi(id) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=deletePaiement&id=${encodeURIComponent(id)}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    await fetchAll();
  } catch (err) { isOnline = false; render(); }
}

async function addEvenementApi(date, heure, type, titre, lieu, equipe) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=addEvenement&date=${encodeURIComponent(date)}&heure=${encodeURIComponent(heure)}&type=${encodeURIComponent(type)}&titre=${encodeURIComponent(titre)}&lieu=${encodeURIComponent(lieu)}&equipe=${encodeURIComponent(equipe || session.equipe || "SM1")}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    showAddEvent = false;
    await fetchAll();
  } catch (err) { isOnline = false; render(); }
}

async function deleteEvenementApi(id) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=deleteEvenement&id=${encodeURIComponent(id)}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    await fetchAll();
  } catch (err) { isOnline = false; render(); }
}

async function updateEvenementApi(id, date, heure, type, titre, lieu, equipe) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=updateEvenement&id=${encodeURIComponent(id)}&date=${encodeURIComponent(date)}&heure=${encodeURIComponent(heure)}&type=${encodeURIComponent(type)}&titre=${encodeURIComponent(titre)}&lieu=${encodeURIComponent(lieu)}&equipe=${encodeURIComponent(equipe || "SM1")}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    window.__editingEvenementId = null;
    await fetchAll();
  } catch (err) { isOnline = false; render(); }
}

async function addActualiteApi(titre, scope, texte) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=addActualite&titre=${encodeURIComponent(titre)}&scope=${encodeURIComponent(scope)}&texte=${encodeURIComponent(texte)}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);

  } catch (err) { isOnline = false; render(); }
}

async function deleteActualiteApi(id) {
  try {
    await fetch(`${GOOGLE_SCRIPT_URL}?action=deleteActualite&id=${encodeURIComponent(id)}&authNom=${encodeURIComponent(session.nom)}&authCode=${encodeURIComponent(session.code)}`);
    await fetchAll();
  } catch (err) { isOnline = false; render(); }
}

async function fetchSalariesFolder(folderId, newBreadcrumb) {
  const cacheKey = folderId || "__root__";
  const cached = salariesCache[cacheKey];

  if (cached) {
    // Affichage instantané depuis le cache pendant qu'on rafraîchit en arrière-plan
    const bc = newBreadcrumb || (salariesState.breadcrumb.length ? salariesState.breadcrumb : [{ id: cached.currentFolder.id, name: "Racine" }]);
    salariesState = { loading: false, loaded: true, error: null, currentFolder: cached.currentFolder, folders: cached.folders, files: cached.files, breadcrumb: bc };
    render();
  } else {
    salariesState.loading = true;
    salariesState.error = null;
    if (newBreadcrumb) salariesState.breadcrumb = newBreadcrumb;
    render();
  }

  try {
    const params = new URLSearchParams({ action: "salariesList", authNom: session.nom, authCode: session.code });
    if (folderId) params.set("folderId", folderId);
    const res = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);
    const data = await res.json();
    if (data.ok) {
      salariesCache[cacheKey] = { folders: data.folders, files: data.files, currentFolder: data.currentFolder };
      let bc = newBreadcrumb || salariesState.breadcrumb;
      if (!bc || bc.length === 0) bc = [{ id: data.currentFolder.id, name: "Racine" }];
      else if (bc[0].id === null) bc[0].id = data.currentFolder.id;
      salariesState = { loading: false, loaded: true, error: null, currentFolder: data.currentFolder, folders: data.folders, files: data.files, breadcrumb: bc };
      isOnline = true;
    } else if (!cached) {
      salariesState.loading = false;
      salariesState.error = "Impossible d'ouvrir ce dossier.";
    }
  } catch (err) {
    isOnline = false;
    if (!cached) {
      salariesState.loading = false;
      salariesState.error = "Connexion impossible.";
    }
  }
  render();
}

// ---------- Calculs ----------

function playerTotal(p) {
  let total = 0;
  ACTIONS.forEach((a, i) => { total += (grid[p] && grid[p][i] || 0) * a[1]; });
  return total;
}

function actionRowTotal(i) {
  let total = 0;
  PLAYERS.forEach(p => { total += (grid[p] && grid[p][i] || 0) * ACTIONS[i][1]; });
  return total;
}

function grandTotal() {
  let total = 0;
  PLAYERS.forEach(p => { total += playerTotal(p); });
  return total;
}

function totalPaye(joueur) {
  return paiements.filter(r => r[1] === joueur).reduce((s, r) => s + (parseFloat(r[2]) || 0), 0);
}

function resteAPayer(joueur) {
  return playerTotal(joueur) - totalPaye(joueur);
}

function fmt(n) {
  n = Math.round(n * 10) / 10;
  return Number.isInteger(n) ? n.toString() : n.toFixed(1);
}

function formatDateKey(d) {
  return d.toISOString().slice(0, 10);
}

// ---------- Sélecteurs Date/Heure compacts (remplacent les <input type=date/time>
// natifs, dont le rendu déborde sur certains téléphones) ----------
const MONTHS_FR = ["janv.", "févr.", "mars", "avr.", "mai", "juin", "juil.", "août", "sept.", "oct.", "nov.", "déc."];

function dateSelectHtml(prefix, isoDate) {
  let day = "", month = "", year = new Date().getFullYear();
  if (isoDate) {
    const [y, m, d] = isoDate.split("-");
    year = parseInt(y, 10); month = parseInt(m, 10); day = parseInt(d, 10);
  }
  const days = Array.from({ length: 31 }, (_, i) => i + 1);
  const years = [SEASON_START.getFullYear(), SEASON_START.getFullYear() + 1, SEASON_START.getFullYear() + 2];
  return `<div class="date-select-row">
    <select id="${prefix}-day">
      <option value="">Jour</option>
      ${days.map(d => `<option value="${String(d).padStart(2, "0")}" ${d === day ? "selected" : ""}>${d}</option>`).join("")}
    </select>
    <select id="${prefix}-month">
      <option value="">Mois</option>
      ${MONTHS_FR.map((m, i) => `<option value="${String(i + 1).padStart(2, "0")}" ${(i + 1) === month ? "selected" : ""}>${m}</option>`).join("")}
    </select>
    <select id="${prefix}-year">
      ${years.map(y => `<option value="${y}" ${y === year ? "selected" : ""}>${y}</option>`).join("")}
    </select>
  </div>`;
}

function heureSelectHtml(prefix, isoHeure) {
  let h = "", m = "00";
  if (isoHeure) {
    const [hh, mm] = isoHeure.split(":");
    h = parseInt(hh, 10); m = mm;
  }
  const hours = Array.from({ length: 24 }, (_, i) => i);
  const minutes = ["00", "15", "30", "45"];
  return `<div class="date-select-row">
    <select id="${prefix}-h">
      <option value="">Heure</option>
      ${hours.map(v => `<option value="${String(v).padStart(2, "0")}" ${v === h ? "selected" : ""}>${String(v).padStart(2, "0")}h</option>`).join("")}
    </select>
    <select id="${prefix}-m">
      ${minutes.map(v => `<option value="${v}" ${v === m ? "selected" : ""}>${v}</option>`).join("")}
    </select>
  </div>`;
}

function readDateSelect(prefix) {
  const day = document.getElementById(`${prefix}-day`).value;
  const month = document.getElementById(`${prefix}-month`).value;
  const year = document.getElementById(`${prefix}-year`).value;
  if (!day || !month || !year) return "";
  return `${year}-${month}-${day}`;
}

  const m = document.getElementById(`${prefix}-m`).value;
  if (!h) return "";
  return `${h}:${m}`;

function formatDateFr(d) {
  return d.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
}

function getActiveWeekTrainings() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  const diffToMonday = (day === 0 ? -6 : 1 - day);
  monday.setDate(now.getDate() + diffToMonday);
  monday.setHours(0, 0, 0, 0);

  let tuesday = new Date(monday); tuesday.setDate(monday.getDate() + 1);
  let thursday = new Date(monday); thursday.setDate(monday.getDate() + 3);
  const thursdayEnd = new Date(thursday); thursdayEnd.setHours(23, 59, 59, 999);

  if (now > thursdayEnd) {
    monday.setDate(monday.getDate() + 7);
    tuesday.setDate(tuesday.getDate() + 7);
    thursday.setDate(thursday.getDate() + 7);
  }
  return [tuesday, thursday];
}

function getSeasonWeeks() {
  const weeks = [];
  // trouve le premier mardi >= SEASON_START
  let tuesday = new Date(SEASON_START);
  while (tuesday.getDay() !== 2) tuesday.setDate(tuesday.getDate() + 1);
  while (tuesday <= SEASON_END) {
    const thursday = new Date(tuesday);
    thursday.setDate(tuesday.getDate() + 2);
    weeks.push([new Date(tuesday), thursday]);
    tuesday.setDate(tuesday.getDate() + 7);
  }
  return weeks;
}

function formatDateShort(d) {
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
}

function eventDateObj(ev) {
  // ev = [id, date, heure, type, titre, lieu]
  const dateRaw = ev[1] || "";
  const heureRaw = ev[2] || "";
  if (typeof dateRaw === "string" && dateRaw.includes("T")) {
    return new Date(dateRaw); // valeur historique mal formatée, on la parse quand même
  }
  const [y, m, d] = String(dateRaw || "1970-01-01").split("-").map(Number);
  let h = 0, min = 0;
  if (typeof heureRaw === "string" && heureRaw.includes(":")) {
    [h, min] = heureRaw.split(":").map(Number);
  } else if (typeof heureRaw === "string" && heureRaw.includes("T")) {
    const hd = new Date(heureRaw);
    h = hd.getHours(); min = hd.getMinutes();
  }
  return new Date(y || 1970, (m || 1) - 1, d || 1, h || 0, min || 0);
}

function formatHeure(ev) {
  if (!ev[2]) return "";
  const d = eventDateObj(ev);
  return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}

function sortedEvenements() {
  return evenements.slice().sort((a, b) => eventDateObj(a) - eventDateObj(b));
}

function isEntrainement(ev) {
  return typeClass(ev[3]) === "entrainement";
}

// Un Bénévole ne voit jamais les entraînements, seulement les autres types d'événements.
// Chaque équipe voit ses propres événements + les événements "Toutes" (club-wide, ex: repas/soirée) ;
// l'Admin voit tout. Un Salarié (équipe "Toutes") ne voit que les événements club-wide.
function eventEquipe(ev) {
  return ev[6] || "SM1";
}
function getVisibleEvenements() {
  let list = evenements;
  if (session && session.role !== "Admin") {
    const myEquipe = session.equipe || "SM1";
    list = list.filter(ev => {
      const eq = eventEquipe(ev);
      if (myEquipe === "Toutes") return eq === "Toutes";
      return eq === myEquipe || eq === "Toutes";
    });
  }
  if (session && session.role === "Bénévole") {
    list = list.filter(ev => !isEntrainement(ev));
  }
  return list;
}

function sortedVisibleEvenements() {
  return getVisibleEvenements().slice().sort((a, b) => eventDateObj(a) - eventDateObj(b));
}

// Équipes qu'un compte peut consulter : la sienne, celles de ses comptes liés (même "Personne"
// dans Comptes — ex: un joueur SM1 qui est aussi coach U17), et toutes pour l'Admin.
function myAllowedEquipes() {
  if (session.role === "Admin") return TEAMS.slice();
  const myRow = findCompteRow(session.nom);
  const personne = myRow ? (myRow[4] || myRow[0]) : session.nom;
  const linked = comptes.slice(1).filter(c => (c[4] || c[0]) === personne);
  const set = new Set(linked.map(c => c[3] || "SM1"));
  set.add(session.equipe || "SM1");
  return TEAMS.filter(t => set.has(t));
}

function equipesForSwitcher() {
  if (session.role === "Admin") return TEAMS.slice();
  return myAllowedEquipes();
}

// Liste des joueurs d'une équipe donnée, à partir des comptes réels (plus de dépendance à PLAYERS).
function rosterForEquipe(equipe) {
  return comptes.slice(1).filter(c => c[1] === "Joueur" && (c[3] || "SM1") === equipe).map(c => c[0]);
}

function sortedEventsForTeamView(equipeView) {
  let list;
  if (equipeView === "Toutes") {
    list = evenements.filter(ev => eventEquipe(ev) === "Toutes");
  } else {
    list = evenements.filter(ev => { const eq = eventEquipe(ev); return eq === equipeView || eq === "Toutes"; });
  }
  if (session.role === "Bénévole") list = list.filter(ev => !isEntrainement(ev));
  return list.slice().sort((a, b) => eventDateObj(a) - eventDateObj(b));
}

function renderTeamSwitcher(teams, active, dataAttr) {
  if (teams.length <= 1) return "";
  return `<div class="team-switch-row">
    ${teams.map(t => `<button type="button" class="team-switch-btn ${t === active ? 'active' : ''}" data-${dataAttr}="${t}">${t}</button>`).join("")}
  </div>`;
}

function nextEvenement() {
  const now = new Date();
  const in7Days = new Date(now);
  in7Days.setDate(in7Days.getDate() + 7);
  in7Days.setHours(23, 59, 59, 999);

  const visible = sortedVisibleEvenements();
  // Priorité au prochain match s'il y en a un dans les 7 prochains jours
  const upcomingMatch = visible.find(ev => {
    const d = eventDateObj(ev);
    return d >= now && d <= in7Days && typeClass(ev[3]) === "match";
  });
  if (upcomingMatch) return upcomingMatch;

  // Sinon, l'événement le plus proche, quel que soit son type
  return visible.find(ev => eventDateObj(ev) >= now) || null;
}

function getCurrentWeekEvents() {
  const now = new Date();
  const start = new Date(now);
  start.setHours(0, 0, 0, 0);
  const end = new Date(start);
  end.setDate(start.getDate() + 7);
  end.setHours(23, 59, 59, 999);
  return sortedVisibleEvenements().filter(ev => {
    const d = eventDateObj(ev);
    return d >= now && d <= end;
  });
}

function formatEventDateFr(ev) {
  return eventDateObj(ev).toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
}

  else if (currentPage === "profil") html += renderProfilPage();
  else if (currentPage === "actualites") html += renderActualitesPage();
  else if (currentPage === "salaries") html += renderSalariesPage();

  html += `<div class="bottom-nav">`;
  html += mainTabs.map(t =>
    `<button data-page="${t.id}" class="nav-btn ${currentPage === t.id ? 'active' : ''}">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${NAV_ICONS[t.id] || ""}</svg>
      ${t.label}
    </button>`
  ).join("");
  if (extraTabs.length > 0) {
    const extraIcon = currentIsExtra ? (NAV_ICONS[currentPage] || NAV_ICONS.more) : NAV_ICONS.more;
    html += `<div class="bn-select-wrap ${currentIsExtra ? 'active' : ''}">
      <button type="button" class="bn-select-trigger" id="nav-extra-trigger">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${extraIcon}</svg>
        <div class="bn-select-label">${currentIsExtra ? tabs.find(t => t.id === currentPage).label : "Plus"}</div>
      </button>
      ${window.__navExtraMenuOpen ? `<div class="bn-extra-menu">
        ${extraTabs.map(t => `<div class="avatar-menu-item ${currentPage === t.id ? 'active' : ''}" data-nav-extra-item="${t.id}">${t.label}</div>`).join("")}
      </div>` : ""}
    </div>`;
  }
  html += `</div>`;

  app.innerHTML = html;
  attachEvents();

  // Restaure la position de défilement après reconstruction — sauf si on vient de changer
  // de page, auquel cas on repart en haut plutôt que de garder le niveau de défilement précédent.
  const pageChanged = session && __lastRenderedPage !== null && __lastRenderedPage !== currentPage;
  window.scrollTo(0, pageChanged ? 0 : scrollY);
  if (session) __lastRenderedPage = currentPage;
  const newTableWrap = app.querySelector(".table-wrap");
  if (newTableWrap) {
    newTableWrap.scrollLeft = tableScrollLeft;
    newTableWrap.scrollTop = tableScrollTop;
  }

  // Restaure les valeurs de formulaire en cours de saisie
  Object.keys(fieldValues).forEach(id => {
    const el = document.getElementById(id);
    if (el && el.value !== fieldValues[id]) el.value = fieldValues[id];
  });
  if (activeId && activeId !== "nav-extra") {
    const el = document.getElementById(activeId);
    if (el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA") && typeof el.focus === "function") {
      el.focus();
      if (activeSelStart !== null && typeof el.setSelectionRange === "function") {
        try { el.setSelectionRange(activeSelStart, activeSelEnd); } catch (e) {}
      }
    }
  }
}

function getTabsForRole(role, equipe) {
  const tabs = [
    { id: "home", label: "Accueil", main: true },
    { id: "agenda", label: "Agenda", main: true },
    { id: "actualites", label: "Actualités", main: true },
  ];
  // Caisse noire et Paiements restent réservés à la SM1 pour le moment
  // (l'Admin, dont l'équipe est "Toutes", garde accès à tout). Présence, elle,
  // est désormais disponible pour toutes les équipes (roster tiré des comptes réels).
  const isSM1 = equipe === "SM1" || role === "Admin";
  if (isSM1 && (role === "Joueur" || role === "Coach" || role === "Admin")) {
    tabs.push({ id: "table", label: "Caisse", main: true });
  }

  // Peu d'onglets principaux (ex: équipe sans caisse noire) -> Profil directement dans le bandeau.
  if (tabs.filter(t => t.main).length <= 3) {
    tabs.push({ id: "profil", label: "Profil", main: true });
  }

  const extra = [];
  if (role === "Coach" || role === "Admin") extra.push({ id: "presence", label: "Présence", main: false });
  if (role === "Admin") extra.push({ id: "paiements", label: "Paiements", main: false });
  if (role === "Salarié" || role === "Admin") extra.push({ id: "salaries", label: "Espace salariés", main: false });

  // Un seul élément dans "Plus" -> inutile de le cacher derrière un clic, on l'affiche directement.
  if (extra.length === 1) {
    tabs.push({ ...extra[0], main: true });
  } else {
    tabs.push(...extra);
  }

  return tabs;
}

function computeAverages(equipe, monthOnly) {
  const roster = rosterForEquipe(equipe);
  let evs = evenements.filter(ev => eventEquipe(ev) === equipe);
  if (monthOnly) {
    const now = new Date();
    evs = evs.filter(ev => {
      const d = eventDateObj(ev);
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    });
  }
  return roster.map(p => {
    let oui = 0, total = 0;
    evs.forEach(ev => {
      const v = presenceEvenements[`${ev[0]}_${p}`];
      if (v === "Oui" || v === "Non") {
        total++;
        if (v === "Oui") oui++;
      }
    });
    return { p, pct: total > 0 ? (oui / total) * 100 : null, oui, total };
  }).sort((a, b) => (b.pct ?? -1) - (a.pct ?? -1));
}

function renderAverageCard(equipe, monthOnly) {
  const stats = computeAverages(equipe, monthOnly);
  const stateKey = monthOnly ? "__monthAvgExpanded" : "__seasonAvgExpanded";
  const toggleAttr = monthOnly ? "data-toggle-month-avg" : "data-toggle-season-avg";
  const expanded = !!window[stateKey];
  const visible = expanded ? stats : stats.slice(0, 5);
  const monthLabel = new Date().toLocaleDateString("fr-FR", { month: "long" });
  const title = monthOnly ? `Moyenne de présence - ${monthLabel}` : "Moyenne de présence - saison";
  let html = `<div class="card">
    <div class="section-h" style="margin-bottom:8px;">${title}</div>`;
  if (stats.length === 0) {
    html += `<div class="muted">Aucun joueur enregistré pour cette équipe.</div>`;
  } else if (stats.every(s => s.pct === null)) {
    html += `<div class="muted">Pas encore de données de présence.</div>`;
  } else {
    visible.forEach(s => {
      const label = s.pct === null ? "Pas de donnée" : `${fmt(s.pct)} %`;
      const color = s.pct === null ? "#5a6b8c" : (s.pct >= 75 ? "#33d17a" : (s.pct >= 50 ? "#ffb43c" : "#ff5a5a"));
      html += `<div class="presence-row"><div>${s.p}</div><div style="color:${color}; font-weight:700; font-size:12px;">${label}</div></div>`;
    });
    if (stats.length > 5) {
      html += `<div class="expand-toggle" ${toggleAttr}="1">${expanded ? "Réduire ▲" : `Voir les ${stats.length - 5} autres ▾`}</div>`;
    }
  }
  html += `</div>`;
  return html;
}

function renderHome() {
  const canManage = session.role === "Coach" || session.role === "Admin";
  let html = "";

  const nextEv = nextEvenement();

  // Titre dynamique façon maquette
  if (nextEv) {
    const d = eventDateObj(nextEv);
    const dayName = d.toLocaleDateString("fr-FR", { weekday: "long" });
    const diffDays = Math.round((d - new Date()) / (1000 * 60 * 60 * 24));
    const headline = `Prêt pour ${dayName} ?`;
    const sub = diffDays <= 0 ? "C'est aujourd'hui !" : diffDays === 1 ? "C'est demain !" : `Dans ${diffDays} jours.`;
    html += `<div class="page-title">${headline}</div><div class="page-sub">${sub}</div>`;
  } else {
    html += `<div class="page-title">Salut ${session.nom}</div><div class="page-sub">Aucun événement prévu pour le moment.</div>`;
  }

  html += renderNextEventCard();

  // Stats compactes : caisse noire + présence perso
  if (PLAYERS.includes(session.nom)) {
    const total = playerTotal(session.nom);
    const rank = PLAYERS.map(p => ({ p, t: playerTotal(p) })).sort((a, b) => b.t - a.t);
    const myRank = rank.findIndex(r => r.p === session.nom) + 1;
    const myStats = computeAverages(session.equipe || "SM1", false).find(s => s.p === session.nom);
    const pctDisplay = myStats && myStats.pct !== null ? `${fmt(myStats.pct)}%` : "-";
    const pctSub = myStats && myStats.total > 0 ? `${myStats.oui}/${myStats.total}` : "Pas de donnée";

    html += `<div class="grid2">
      <div class="stat alt"><div class="stat-bar"></div><div class="stat-label">Caisse noire</div><div class="stat-value warn">${fmt(total)}€</div><div class="stat-sub">${myRank}e / ${PLAYERS.length}</div></div>
      <div class="stat"><div class="stat-bar"></div><div class="stat-label">Présence</div><div class="stat-value">${pctDisplay}</div><div class="stat-sub">${pctSub}</div></div>
    </div>`;
  }

  const weekEvents = getCurrentWeekEvents().filter(ev => !nextEv || ev[0] !== nextEv[0]);
  html += `<div class="section-h">Cette semaine</div>`;
  if (weekEvents.length > 0) {
    weekEvents.forEach(ev => {
      const isPast = eventDateObj(ev) < new Date();
      html += renderEventCard(ev, canManage, isPast);
    });
  } else if (!nextEv) {
    html += `<div class="card muted">Aucun événement prévu pour le moment.</div>`;
  } else {
    html += `<div class="card muted">Aucun autre événement dans les 7 prochains jours.</div>`;
  }

  // Fil d'actualité
  html += `<div class="section-h">Fil d'actualité</div>`;
  const homeActus = visibleActualites().slice(0, 2);
  if (homeActus.length === 0) {
    html += `<div class="card muted">Aucune actualité pour le moment.</div>`;
  } else {
    homeActus.forEach(a => {
      const [id, titre, scope] = a;
      html += `<div class="card" style="padding:12px;">
        <span class="badge">${scope === "Générale" ? "Générale" : scope}</span>
        <div style="font-size:12.5px; font-weight:700; color:#e8e8ee; margin-top:6px;">${escapeHtml(titre)}</div>
      </div>`;
    });
  }

  if (PLAYERS.includes(session.nom)) {
    html += `<div class="section-h">Caisse noire</div>`;
    const total = playerTotal(session.nom);
    const lines = ACTIONS.map((a, i) => ({ name: a[0], val: a[1], count: (grid[session.nom] && grid[session.nom][i]) || 0 }))
      .filter(l => l.count > 0);

    html += `<div class="card">
      <div class="muted" style="margin-bottom:8px;">Détail des actions enregistrées</div>`;
    if (lines.length === 0) {
      html += `<div class="muted">Aucune action enregistrée pour le moment.</div>`;
    } else {
      lines.forEach(l => { html += `<span class="pill">${l.name} ×${fmt(l.count)} = ${fmt(l.count * l.val)} €</span>`; });
    }
    html += `</div>`;

    html += `<div class="card">
      <div class="muted">Total caisse de l'équipe</div>
      <div class="big-number">${fmt(grandTotal())} €</div>
    </div>`;
  } else {
    html += `<div class="card"><div class="muted">Bienvenue, ${session.nom}.</div></div>`;
  }

  return html;
}

function typeClass(type) {
  const t = (type || "").toLowerCase();
  if (t.includes("match")) return "match";
  if (t.includes("entra")) return "entrainement";
  if (t.includes("repas")) return "repas";
  if (t.includes("soir")) return "soiree";
  if (t.includes("benevole") || t.includes("bénévole")) return "benevole";
  return "autre";
}

function weekRangeLabel(d) {
  const monday = new Date(d);
  const dow = (d.getDay() + 6) % 7; // 0 = lundi
  monday.setDate(d.getDate() - dow);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = (dt) => dt.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
  return `du ${fmt(monday)} au ${fmt(sunday)}`;
}

function eventGroupLabel(ev) {
  return `Semaine ${weekRangeLabel(eventDateObj(ev))}`;
}

function renderNextEventCard() {

  const countdownLabel = diffDays <= 0 ? "Aujourd'hui" : diffDays === 1 ? "Demain" : `Dans ${diffDays} jours`;

  return `<div class="next-card"><div class="nc-inner">

}

function renderAgenda() {
  const isSalarie = session.role === "Salarié";
  const canManage = session.role === "Coach" || session.role === "Admin" || isSalarie;
  const switcherTeams = isSalarie ? [] : equipesForSwitcher();
  const defaultTeam = isSalarie ? "Toutes" : (session.role === "Admin" ? (switcherTeams[0] || "SM1") : (session.equipe || "SM1"));
  const activeTeam = isSalarie ? "Toutes" : ((window.__agendaTeamView && switcherTeams.includes(window.__agendaTeamView)) ? window.__agendaTeamView : defaultTeam);
  const equipeLabel = activeTeam === "Toutes" ? "du club (repas, soirées, événements communs)" : `de l'équipe ${activeTeam}`;

      </div>`;
    }
  }

  html += renderTeamSwitcher(switcherTeams, activeTeam, "agenda-team");

  if (session.role === "Admin" && activeTeam !== "Toutes") {
    html += `<button class="add-toggle" id="toggle-generate-trainings" style="border-style:solid; color:#7a8aad;">📅 ${window.__showGenerateTrainings ? "− Fermer" : "Générer les entraînements (mar/jeu)"}</button>`;

  }

  const sorted = sortedEventsForTeamView(activeTeam);
  const now = new Date();
  const upcoming = sorted.filter(ev => eventDateObj(ev) >= now);

  if (upcoming.length === 0) {
    html += `<div class="section-h">À venir</div><div class="card muted">Aucun événement à venir pour le moment.</div>`;
  } else {
    let lastLabel = null;
    upcoming.forEach(ev => {
      const label = eventGroupLabel(ev);
      if (label !== lastLabel) {
        html += `<div class="section-h">${label}</div>`;
        lastLabel = label;
      }
      html += renderEventCard(ev, canManage);
    });
  }

  if (past.length > 0) {
    html += `<div class="section-h">Passés</div>`;
    past.slice(0, 8).forEach(ev => { html += renderEventCard(ev, canManage, true); });
  }

  return html;
}

const ICON_CROSS = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';

function iconBtn(pathHtml, cls, attrsHtml) {
  return `<span class="${cls}" ${attrsHtml}><svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">${pathHtml}</svg></span>`;
}

function renderJustifBlock(eventId) {
  const saved = presenceJustifications[`${eventId}_${session.nom}`] || "";
  const editing = !!(window.__justifEditing && window.__justifEditing[eventId]);

  if (saved && !editing) {
    return `<div class="justif-wrap">
      <label class="field-label" style="margin-top:8px;">Motif de l'absence</label>
      <div class="justif-saved">
        <span>${escapeHtml(saved)}</span>
        <button type="button" class="justif-edit-btn" data-justif-edit="${eventId}">Modifier</button>
      </div>
    </div>`;
  }

  return `<div class="justif-wrap">
    <label class="field-label" style="margin-top:8px;">Motif de l'absence</label>
    <input type="text" id="justif-${eventId}" class="justif-input" placeholder="ex : blessure, travail, transport..." value="${escapeHtml(saved)}" />
    <button type="button" class="btn secondary justif-validate-btn" data-justif-validate="${eventId}">Valider le motif</button>
  </div>`;
}

function renderEventCard(ev, canManage, isPast) {
  const [id, date, heure, type, titre, lieu, equipe] = ev;
  const d = eventDateObj(ev);
  const val = presenceEvenements[`${id}_${session.nom}`];
  let presentCount = 0, absentCount = 0;
  const allNames = [...PLAYERS, "Coach", "Admin", "Bénévole"];
  allNames.forEach(n => {
    const v = presenceEvenements[`${id}_${n}`];
    if (v === "Oui") presentCount++;
    else if (v === "Non") absentCount++;
  });

  if (canManage && window.__editingEvenementId === id) {
    return `<div class="ev-card" style="display:block;">
      <label class="field-label">Date</label>
      ${dateSelectHtml(`edit-ev-date-${id}`, date || "")}
      <label class="field-label">Heure</label>
      ${heureSelectHtml(`edit-ev-heure-${id}`, heure || "")}
      <label class="field-label">Type</label>
      <select id="edit-ev-type-${id}">
        ${["Match", "Entraînement", "Repas", "Soirée", "Bénévole", "Autre"].map(t => `<option value="${t}" ${type === t ? "selected" : ""}>${t}</option>`).join("")}
      </select>
      <label class="field-label">Titre</label>
      <input id="edit-ev-titre-${id}" type="text" value="${titre || ''}" />
      <label class="field-label">Lieu</label>
      <input id="edit-ev-lieu-${id}" type="text" value="${lieu || ''}" />
      ${(session.role === "Admin" || session.role === "Salarié") ? `<label class="field-label">Équipe</label>
      <select id="edit-ev-equipe-${id}">
        ${TEAMS.map(t => `<option value="${t}" ${(equipe || "SM1") === t ? "selected" : ""}>${t}</option>`).join("")}
        <option value="Toutes" ${equipe === "Toutes" ? "selected" : ""}>Toutes (club entier)</option>
      </select>` : ""}
      <div class="row-flex" style="margin-top:10px;">
        <button class="btn" style="flex:1;" data-save-event="${id}">Enregistrer</button>
        <button class="btn secondary" style="flex:1;" data-cancel-edit-event="1">Annuler</button>
      </div>
    </div>`;
  }

  const dateFr = eventDateObj(ev).toLocaleDateString("fr-FR", { weekday: "short", day: "numeric", month: "short" });
  const heureFmt = formatHeure(ev);

  return `<div class="ev-card" style="${isPast ? 'opacity:0.55;' : ''}">
    <div class="ev-date"><div class="ev-day">${d.getDate()}</div><div class="ev-month">${d.toLocaleDateString("fr-FR", { month: "short" })}</div></div>
    <div class="ev-divider"></div>
    <div class="ev-info">
      <div class="ev-header-row">
        <div class="ev-title-big">${titre || "Sans titre"}</div>
        <span class="ev-type-big ${typeClass(type)}">${type || "Événement"}</span>
      </div>
      <div class="ev-date-full">${dateFr}${heureFmt ? " · " + heureFmt : ""}</div>
      <div class="ev-meta">${lieu || ""}${canManage ? (lieu ? " · " : "") + presentCount + " présents / " + absentCount + " absents" : ""}</div>
      ${(!isPast && session.role !== "Bénévole") ? `<div class="toggle-group" style="margin-top:8px;">
        <button class="toggle-btn ${val === 'Oui' ? 'present' : ''}" data-event-presence="${id}" data-event-val="1">Présent</button>
        <button class="toggle-btn ${val === 'Non' ? 'absent' : ''}" data-event-presence="${id}" data-event-val="0">Absent</button>
      </div>
      ${val === 'Non' ? renderJustifBlock(id) : ""}` : ""}
    </div>
    ${canManage ? `<div class="ev-actions">
      ${iconBtn(ICON_EDIT, "ev-edit", `data-edit-event="${id}"`)}
      ${iconBtn(ICON_CROSS, "ev-del", `data-delete-event="${id}"`)}
    </div>` : ""}
  </div>`;
}

function renderCaisseNoireSummary() {
  const sortedPlayers = [...PLAYERS].sort((a, b) => playerTotal(b) - playerTotal(a));
  const TOP_COUNT = 5;
  const showAll = !!window.__showAllPlayers;
  const visiblePlayers = showAll ? sortedPlayers : sortedPlayers.slice(0, TOP_COUNT);
  const hasMore = sortedPlayers.length > TOP_COUNT;
  const expanded = window.__expandedPlayers || {};

  let html = `<div class="page-title">Caisse noire</div><div class="page-sub">Total et détail des actions de chaque joueur.</div>`;

  html += `<div class="cn-hero">
    <div class="cn-hero-label">Total équipe</div>
    <div class="cn-hero-value">${fmt(grandTotal())} €</div>
  </div>`;

  html += `<button class="btn add-btn-primary" id="cn-add-action">${window.__showQuickAdd ? "− Fermer" : "+ Saisir une action"}</button>`;

  if (window.__showQuickAdd) {
    html += renderQuickAddForm();
  }

  const isAdmin = session.role === "Admin";
  const FROZEN_ACTIONS = ["participation mensuelle"];

  const renderPlayerCard = (p) => {
    const total = playerTotal(p);
    const items = [];
    ACTIONS.forEach((a, i) => {
      const count = (grid[p] && grid[p][i]) || 0;
      if (count > 0) items.push({ label: a[0], count, value: count * a[1], index: i, frozen: FROZEN_ACTIONS.includes(a[0]) });
    });
    const isExpanded = !!expanded[p];
    const visibleItems = isExpanded ? items : items.slice(0, 3);
    const hiddenCount = items.length - visibleItems.length;
    const editingThis = isAdmin && window.__cnEditPlayer === p;
    const editableItems = items.filter(it => !it.frozen);

    let bubbles = visibleItems.map(it =>
      `<span class="cn-bubble">${it.label} ×${it.count} <span class="cn-bubble-val">${fmt(it.value)}€</span></span>`
    ).join("");
    if (hiddenCount > 0) {
      bubbles += `<span class="cn-bubble cn-bubble-more" data-expand-player="${p}">+${hiddenCount} autre${hiddenCount > 1 ? "s" : ""}</span>`;
    } else if (isExpanded && items.length > 3) {
      bubbles += `<span class="cn-bubble cn-bubble-more" data-collapse-player="${p}">Réduire</span>`;
    }

    let editBlock = "";
    if (editingThis) {
      if (window.__cnEditActionIndex === null || window.__cnEditActionIndex === undefined) {
        editBlock = `<div class="cn-edit-picker">
          ${editableItems.length === 0
            ? `<div class="muted" style="font-size:11px;">Aucune action modifiable pour ce joueur.</div>`
            : editableItems.map(it => `<div class="cn-edit-pick-row" data-cn-pick-action="${it.index}" data-cn-pick-player="${p}">
                <span>${it.label} ×${it.count}</span><span class="cn-bubble-val">${fmt(it.value)}€</span>
              </div>`).join("")}
          <div class="cn-edit-cancel" data-cn-edit-cancel="1">Annuler</div>
        </div>`;
      } else {
        const idx = window.__cnEditActionIndex;
        const currentCount = (grid[p] && grid[p][idx]) || 0;
        const qty = window.__cnEditQty !== null && window.__cnEditQty !== undefined ? window.__cnEditQty : currentCount;
        editBlock = `<div class="cn-edit-picker">
          <div class="field-label">${ACTIONS[idx][0]}</div>
          <div class="qty-stepper">
            <button type="button" class="qty-btn" data-cn-edit-delta="-1">−</button>
            <div class="qty-value">${qty}</div>
            <button type="button" class="qty-btn" data-cn-edit-delta="1">+</button>
          </div>
          <div class="row-flex" style="margin-top:8px;">
            <button class="btn" style="flex:1;" data-cn-edit-save="${idx}" data-cn-edit-save-player="${p}">Enregistrer</button>
            <button class="btn secondary" style="flex:1;" data-cn-edit-cancel="1">Annuler</button>
          </div>
        </div>`;
      }
    }

    return `<div class="card cn-card">
      <div class="cn-row">
        <div class="cn-avatar">${getInitials(p)}</div>
        <div class="cn-info">
          <div class="cn-name-row">
            <span class="cn-name">${p}</span>
            <span class="cn-amount">${fmt(total)} €</span>
          </div>
          ${items.length ? `<div class="cn-bubbles">${bubbles}</div>` : `<div class="cn-actions muted">Aucune action enregistrée</div>`}
          ${isAdmin && items.length > 0 ? `<div class="justif-edit-btn cn-modifier-btn" data-cn-toggle-edit="${p}">${editingThis ? "Fermer" : "Modifier"}</div>` : ""}
          ${editBlock}
        </div>
      </div>
    </div>`;
  };

  if (sortedPlayers.length === 0) {
    html += `<div class="card"><div class="muted">Aucun joueur pour le moment.</div></div>`;
  } else {
    visiblePlayers.forEach(p => { html += renderPlayerCard(p); });
    if (hasMore) {
      html += `<div class="expand-toggle" data-toggle-players="1">${showAll ? "Réduire ▲" : "Voir les autres joueurs ▾"}</div>`;
    }
  }

  html += `<div class="cn-toggle-detail" id="cn-toggle-detail">${window.__showDetailTable ? "Masquer le tableau détaillé ▲" : "Voir le tableau détaillé ▾"}</div>`;

  if (window.__showDetailTable) {
    html += renderDetailTable();
  }

  return html;
}

function renderDetailTable() {
  let html = `<div class="row-flex" style="margin-top:10px;">
    <button class="btn secondary" id="export-csv">Exporter CSV</button>
  </div>`;
  html += `<div class="table-wrap"><table>
    <thead><tr>
      <th class="action-name">Action</th>
      <th>Val.</th>
      ${PLAYERS.map(p => `<th>${p}</th>`).join("")}
      <th>Total</th>
    </tr></thead><tbody>`;

  ACTIONS.forEach((a, i) => {
    const rowTotal = actionRowTotal(i);
    html += `<tr>
      <td class="action-name">${a[0]}</td>
      <td>${fmt(a[1])}€</td>
      ${PLAYERS.map(p => {
        const count = (grid[p] && grid[p][i]) || 0;
        const cellValue = count * a[1];
        return `<td>
          <select data-player="${p}" data-action="${i}" class="cell-select" style="width:54px; padding:3px; font-size:11px;">
            ${Array.from({length: 51}, (_, v) => `<option value="${v}" ${count === v ? "selected" : ""}>${v}</option>`).join("")}
          </select>
          <div class="cell-euro">${fmt(cellValue)}€</div>
        </td>`;
      }).join("")}
      <td>${fmt(rowTotal)}€</td>
    </tr>`;
  });

  html += `<tr class="total-row">
    <td class="action-name">TOTAL</td>
    <td></td>
    ${PLAYERS.map(p => `<td>${fmt(playerTotal(p))}€</td>`).join("")}
    <td>${fmt(grandTotal())}€</td>
  </tr>`;

  html += `</tbody></table></div>`;
  return html;
}

function renderPresencePage() {
  const switcherTeams = equipesForSwitcher().filter(t => t !== "Toutes"); // pas de vue "toutes" pour la présence (roster par équipe)
  const defaultTeam = switcherTeams.includes(session.equipe) ? session.equipe : (switcherTeams[0] || "SM1");
  const activeTeam = (window.__presenceTeamView && switcherTeams.includes(window.__presenceTeamView)) ? window.__presenceTeamView : defaultTeam;

  const sorted = sortedEvenements().filter(ev => eventEquipe(ev) === activeTeam);
  const now = new Date();
  const upcoming = sorted.filter(ev => eventDateObj(ev) >= now);
  const past = sorted.filter(ev => eventDateObj(ev) < now).reverse();

  let html = `<div class="page-title">Présence</div><div class="page-sub">Suivi des présences de l'équipe.</div>`;
  html += renderTeamSwitcher(switcherTeams, activeTeam, "presence-team");
  html += renderAverageCard(activeTeam, false);
  html += renderAverageCard(activeTeam, true);

  if (upcoming.length === 0) {
    html += `<div class="section-h">À venir</div><div class="card muted">Aucun événement à venir.</div>`;
  } else {
    let lastLabel = null;
    upcoming.forEach(ev => {
      const label = eventGroupLabel(ev);
      if (label !== lastLabel) {
        html += `<div class="section-h">${label}</div>`;
        lastLabel = label;
      }
      html += renderPresenceEventCard(ev, false, activeTeam);
    });
  }

  if (past.length > 0) {
    html += `<div class="section-h">Passés</div>`;
    past.slice(0, 12).forEach(ev => { html += renderPresenceEventCard(ev, true, activeTeam); });
  }

  return html;
}

function renderPresenceEventCard(ev, isPast, activeTeam) {
  const [id, date, heure, type, titre, lieu] = ev;
  const d = eventDateObj(ev);
  const expanded = window.__expandedEventId === id;
  const roster = rosterForEquipe(activeTeam || "SM1").map(p => ({ p, val: presenceEvenements[`${id}_${p}`] }));
  const presentCount = roster.filter(r => r.val === "Oui").length;
  const absentCount = roster.filter(r => r.val === "Non").length;
  const pendingCount = roster.length - presentCount - absentCount;
  const dayName = d.toLocaleDateString("fr-FR", { weekday: "long" });

  let html = `<div class="ev-card" style="flex-direction:column; align-items:stretch; ${isPast ? 'opacity:0.6;' : ''}">
    <div style="display:flex; align-items:center; gap:12px; cursor:pointer;" data-toggle-roster="${id}">
      <div class="ev-date"><div class="ev-day">${d.getDate()}</div><div class="ev-month">${d.toLocaleDateString("fr-FR", { month: "short" })}</div></div>
      <div class="ev-divider"></div>
      <div class="ev-info">
        <div class="ev-header-row">
          <div class="ev-title-big">${titre || "Sans titre"}</div>
          <span class="ev-type-big ${typeClass(type)}">${type || "Événement"}</span>
        </div>
        <div class="ev-meta">${dayName} ${formatHeure(ev) ? "· " + formatHeure(ev) : ""}</div>
      </div>
      <div style="color:#5a6b8c; font-size:16px; flex-shrink:0;">${expanded ? "▲" : "▼"}</div>
    </div>`;

  if (expanded) {
    html += `<div style="margin-top:12px; border-top:1px solid #1a2030; padding-top:12px;">
      <div class="stat-bar-row">
        <span style="color:#33d17a; font-weight:800;">${presentCount} présents</span>
        <span style="color:#ff5a5a; font-weight:700;">${absentCount} absents · <span class="muted" style="font-weight:600;">${pendingCount} en attente</span></span>
      </div>
      <div class="section-h" style="margin:14px 0 6px;">Pointer ${dayName}</div>`;
    roster.forEach(r => {
      const justif = presenceJustifications[`${id}_${r.p}`];
      html += `<div class="pres-card">
        <div class="pres-card-row">
          <div class="cn-avatar pres-avatar">${getInitials(r.p)}</div>
          <div class="pres-card-name">${r.p}</div>
          <div class="toggle-group">
            <button class="toggle-btn ${r.val === 'Oui' ? 'present' : ''}" data-mark-presence="${id}" data-mark-player="${r.p}" data-mark-val="1">Oui</button>
            <button class="toggle-btn ${r.val === 'Non' ? 'absent' : ''}" data-mark-presence="${id}" data-mark-player="${r.p}" data-mark-val="0">Non</button>
          </div>
        </div>
        ${r.val === "Non" && justif ? `<div class="justif-note"><b>Motif :</b> ${escapeHtml(justif)}</div>` : ""}
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

const POSTES = ["ALD", "ARD", "DC", "ARG", "ALG", "PV", "GB", "COACH"];

function findCompteRow(nom) {
  return comptes.slice(1).find(c => c[0] === nom) || null;
}

function computePresenceByType(nom, equipe) {
  const relevantEvents = (equipe && equipe !== "Toutes")
    ? evenements.filter(ev => eventEquipe(ev) === equipe)
    : evenements;
  return ["Match", "Entraînement", "Repas"].map(t => {
    const evs = relevantEvents.filter(ev => (ev[3] || "") === t);
    let oui = 0, total = 0;
    evs.forEach(ev => {
      const v = presenceEvenements[`${ev[0]}_${nom}`];
      if (v === "Oui" || v === "Non") {
        total++;
        if (v === "Oui") oui++;
      }
    });
    return { type: t, pct: total > 0 ? Math.round((oui / total) * 100) : null, oui, total };
  });
}

    <div class="section-h">${title}</div>
    ${stats.map(s => `<div class="ptype-row">
      <div class="ptype-label">${s.type === "Entraînement" ? "Entraîn." : s.type}</div>

      <div class="ptype-pct">${s.pct !== null ? s.pct + "%" : "—"}</div>
      <div class="ptype-sub">${s.total > 0 ? `${s.oui}/${s.total}` : "aucune donnée"}</div>
    </div>`).join("")}
  </div>`;
}

function currentPostes() {
  const row = findCompteRow(session.nom);
  return row && row[5] ? String(row[5]).split(",").map(s => s.trim()).filter(Boolean) : [];
}

  const remaining = POSTES.filter(p => !postes.includes(p));
  const showAddRow = postes.length === 0 || (!!window.__profilPosteAdding && remaining.length > 0);

  let html = `<div class="section-h">Poste</div>`;

  postes.forEach((p, i) => {
    if (editingIndex === i) {
      html += `<div class="poste-locked-row">
        <select id="profil-poste-edit-${i}" class="poste-select">${POSTES.map(o => `<option value="${o}" ${o === p ? "selected" : ""}>${o}</option>`).join("")}</select>
        <button class="btn secondary poste-inline-btn" data-poste-save-index="${i}">Valider</button>
      </div>`;
    } else {
      html += `<div class="poste-locked-row">
        <span class="badge poste-badge">${p}</span>
        <div class="poste-actions">
          <button class="justif-edit-btn" data-poste-edit-index="${i}">Modifier</button>
          <button class="justif-edit-btn" data-poste-remove-index="${i}">Supprimer</button>
        </div>

    }
  });

  if (showAddRow) {
    html += `<div class="poste-locked-row">

        <option value="">— Choisir —</option>
        ${remaining.map(p => `<option value="${p}">${p}</option>`).join("")}
      </select>
      <button class="btn secondary poste-inline-btn" id="profil-poste-add-submit">Ajouter</button>

  } else if (remaining.length > 0) {
    html += `<button class="add-toggle" id="profil-poste-add-toggle" style="margin-top:4px;">+ Ajouter un poste</button>`;
  }

  if (unwrapped) return html;
  return `<div class="card">${html}</div>`;
}

function renderProfilPage() {
  const myRow = findCompteRow(session.nom);
  const personne = myRow ? (myRow[4] || myRow[0]) : session.nom;
  const linkedRows = comptes.slice(1).filter(c => (c[4] || c[0]) === personne);
  const postes = currentPostes();
  const nomComplet = myRow ? (myRow[6] || "") : "";
  const photoUrl = myRow ? (myRow[7] || "") : "";
  const canEditPoste = session.role === "Joueur" || session.role === "Coach" || session.role === "Admin";

  const linkedRoles = new Set(linkedRows.map(r => r[1]));
  const canViewJoueur = linkedRoles.has("Joueur");
  const canViewCoach = linkedRoles.has("Coach");
  const showVueToggle = canViewJoueur && canViewCoach;
  const defaultVue = session.role === "Coach" ? "coach" : "joueur";
  const vue = showVueToggle
    ? ((window.__profilVue === "coach" || window.__profilVue === "joueur") ? window.__profilVue : defaultVue)
    : (canViewCoach && !canViewJoueur ? "coach" : "joueur");

  let html = `<div class="page-title">Mon profil joueur</div>`;
  html += `<div class="page-sub">${nomComplet ? escapeHtml(nomComplet) : session.nom}</div>`;

  // Photo
  html += `<div class="card"><div class="profil-photo-zone">
    <div class="profil-photo-frame">${photoUrl ? `<img src="${escapeHtml(photoUrl)}" alt="Photo de ${escapeHtml(session.nom)}"/>` : getInitials(session.nom)}</div>
    ${!photoUrl ? `<div class="profil-photo-note">Photo officielle à venir — ajoutée par l'Admin</div>` : ""}
  </div></div>`;

  // Rôle dans le club + Poste, côte à côte
  html += `<div style="display:flex; gap:10px; align-items:stretch;">
    <div class="card" style="flex:1; min-width:0;">
      <div class="section-h">Rôle dans le club</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${linkedRows.map(r => {
          const showTeam = r[1] === "Joueur" || r[1] === "Coach";
          return `<span class="badge">${r[1]}${showTeam ? " " + (r[3] || "SM1") : ""}</span>`;
        }).join("")}
      </div>
    </div>
    ${canEditPoste ? `<div class="card" style="flex:1; min-width:0;">${renderPosteCard(postes, true)}</div>` : ""}
  </div>`;

  if (showVueToggle) {
    html += `<div class="team-switch-row">
      <button type="button" class="team-switch-btn ${vue === 'joueur' ? 'active' : ''}" data-profil-vue="joueur">Vue Joueur</button>
      <button type="button" class="team-switch-btn ${vue === 'coach' ? 'active' : ''}" data-profil-vue="coach">Vue Coach</button>
    </div>`;
  }

  if (vue === "coach") {
    const coachRows = linkedRows.filter(r => r[1] === "Coach");
    const coachTeams = [...new Set(coachRows.map(r => r[3] || "SM1"))];
    const defaultCoachTeam = coachTeams.includes(session.equipe) ? session.equipe : (coachTeams[0] || "SM1");
    const chosenCoachTeam = (window.__profilCoachTeamView && coachTeams.includes(window.__profilCoachTeamView)) ? window.__profilCoachTeamView : defaultCoachTeam;
    const coachRowForTeam = coachRows.find(r => (r[3] || "SM1") === chosenCoachTeam) || coachRows[0];
    const coachNomForTeam = coachRowForTeam ? coachRowForTeam[0] : session.nom;

    if (coachTeams.length > 1) {
      html += renderTeamSwitcher(coachTeams, chosenCoachTeam, "profil-coach-team");
    }

    html += renderPtypeCard("Ta présence par type", computePresenceByType(coachNomForTeam, chosenCoachTeam));
    html += renderAverageCard(chosenCoachTeam, false);
    html += renderAverageCard(chosenCoachTeam, true);

    const mesJoueurs = comptes.slice(1).filter(c => c[1] === "Joueur" && (c[3] || "SM1") === chosenCoachTeam);
    const showAll = !!window.__profilJoueursExpanded;
    const visible = showAll ? mesJoueurs : mesJoueurs.slice(0, 4);
    html += `<div class="card">
      <div class="section-h">Mes joueurs (${mesJoueurs.length})</div>
      ${mesJoueurs.length === 0 ? `<div class="muted">Aucun joueur trouvé pour cette équipe.</div>` : visible.map(j => `
        <div class="mesjoueurs-row">
          <div class="cn-avatar" style="width:32px; height:32px; font-size:11px;">${getInitials(j[0])}</div>
          <div class="mesjoueurs-name">${j[0]}</div>
          ${j[5] ? `<span class="badge">${String(j[5]).split(",")[0]}</span>` : ""}
        </div>`).join("")}
      ${mesJoueurs.length > 4 ? `<div class="expand-toggle" data-toggle-profil-joueurs="1">${showAll ? "Réduire ▲" : "Voir les autres ▾"}</div>` : ""}
    </div>`;
  } else {
    const joueurRow = linkedRows.find(r => r[1] === "Joueur");
    const joueurNom = joueurRow ? joueurRow[0] : session.nom;
    const joueurEquipe = joueurRow ? (joueurRow[3] || "SM1") : (session.equipe || "SM1");
    html += renderPtypeCard("Présence par type", computePresenceByType(joueurNom, joueurEquipe));
    html += renderStatsRecapCard(postes);
  }

  return html;
}

const ACTU_SCOPES = ["Générale", ...TEAMS];

function visibleActualites() {
  let list = actualites;
  if (session.role !== "Admin" && session.role !== "Salarié") {
    list = list.filter(a => a[2] === "Générale" || a[2] === (session.equipe || "SM1"));
  }
  return list.slice().sort((a, b) => String(b[5] || "").localeCompare(String(a[5] || "")));
}

function scopesForActuCreation() {
  if (session.role === "Admin") return ACTU_SCOPES;
  if (session.role === "Coach") return [session.equipe || "SM1"];
  return [];
}

function actuFilterOptions() {
  if (session.role === "Admin" || session.role === "Salarié") return ["Générale", ...TEAMS];
  return ["Générale", session.equipe || "SM1"];
}

function renderPaiementsPage() {
  const totalDu = grandTotal();
