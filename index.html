  const resteAEncaisser = totalDu - totalPayeAll;

  let html = `<div class="page-title">Paiements</div><div class="page-sub">Suivi de la trésorerie.</div>`;

  html += `<div class="pay-summary">

    <div class="pay-summary-val">${fmt(resteAEncaisser)} €</div>

  html += `<button class="btn add-btn-primary" id="toggle-add-paiement">${window.__showAddPaiement ? "− Fermer" : "+ Ajouter un paiement"}</button>`;

    html += `<div class="add-form">
      <label class="field-label">Joueur</label>

      <label class="field-label">Commentaire (optionnel)</label>
      <input id="paiement-commentaire" type="text" placeholder="Ex: virement, espèces..." />
      <button class="btn" id="paiement-add" style="margin-top:6px;">Enregistrer le paiement</button>
    </div>`;
  }

  html += `<div class="section-h">Reste à payer</div><div class="card">`;
  const resteSorted = PLAYERS.slice().sort((a, b) => resteAPayer(b) - resteAPayer(a));
  const resteExpanded = !!window.__resteAPayerExpanded;
  const resteVisible = resteExpanded ? resteSorted : resteSorted.slice(0, 6);
  resteVisible.forEach(p => {

    html += `<div class="expand-toggle" data-toggle-reste-payer="1">${resteExpanded ? "Réduire ▲" : `Voir les ${resteSorted.length - 6} autres ▾`}</div>`;

  html += `<div class="section-h">Derniers paiements</div>`;

    html += `<div class="card muted">Aucun paiement enregistré pour le moment.</div>`;

    html += `<div class="card">`;
    paiements.slice().reverse().forEach(r => {

      if (window.__editingPaiementId === id) {
        html += `<div class="paiement-row" style="display:block; padding:10px 0;">

            ${PLAYERS.map(p => `<option value="${p}" ${p === joueur ? "selected" : ""}>${p}</option>`).join("")}

          <input id="edit-montant-${id}" type="number" step="0.5" value="${montant}" style="margin-bottom:6px;" />
          <input id="edit-commentaire-${id}" type="text" value="${commentaire || ""}" placeholder="Commentaire" style="margin-bottom:8px;" />
          <div class="row-flex">

        html += `<div class="paiement-row">

  }

  return html;
}

// ---------- Events ----------

function vibrate() {
  if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
}

// Retour visuel immédiat au toucher, indépendant du rafraîchissement de la page
// (le CSS :active seul n'a pas toujours le temps de s'afficher avant le re-rendu)
const TAP_SELECTOR = ".btn, .nav-btn, .toggle-btn, .ev-edit, .ev-del, .bottom-nav button, .expand-toggle, .avatar-btn, .avatar-menu-item, .qty-btn, .add-toggle, .justif-edit-btn, .team-switch-btn, .cn-edit-pick-row, .cn-edit-cancel, .folder-card, .salaries-type-btn";
document.addEventListener("touchstart", (e) => {
  const el = e.target.closest(TAP_SELECTOR);
  if (el) el.classList.add("tap-active");
}, { passive: true });
["touchend", "touchcancel"].forEach(evt => {
  document.addEventListener(evt, () => {
    document.querySelectorAll(".tap-active").forEach(el => el.classList.remove("tap-active"));
  }, { passive: true });
});

function attachEvents() {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.onclick = () => { vibrate(); currentPage = btn.dataset.page; window.__avatarMenuOpen = false; render(); };
  });

  const navExtraTrigger = document.getElementById("nav-extra-trigger");
  if (navExtraTrigger) navExtraTrigger.onclick = () => {
    vibrate();
    window.__navExtraMenuOpen = !window.__navExtraMenuOpen;
    render();
  };

  document.querySelectorAll("[data-nav-extra-item]").forEach(el => {
    el.onclick = () => {
      vibrate();
      currentPage = el.dataset.navExtraItem;
      window.__navExtraMenuOpen = false;
      window.__avatarMenuOpen = false;
      render();
    };
  });

  document.querySelectorAll("[data-event-presence]").forEach(btn => {
    btn.onclick = (e) => {
      vibrate();
      const eventId = e.currentTarget.dataset.eventPresence;
      const val = e.currentTarget.dataset.eventVal === "1";
      writePresenceEvenementApi(eventId, session.nom, val);
      if (val && presenceJustifications[`${eventId}_${session.nom}`]) {
        if (window.__justifEditing) window.__justifEditing[eventId] = false;
        writeJustificationApi(eventId, session.nom, "");
      }
    };
  });

  document.querySelectorAll("[data-justif-validate]").forEach(btn => {
    btn.onclick = (e) => {
      vibrate();
      const eventId = e.currentTarget.dataset.justifValidate;
      const input = document.getElementById(`justif-${eventId}`);
      const texte = input ? input.value.trim() : "";
      window.__justifEditing = window.__justifEditing || {};
      window.__justifEditing[eventId] = false;
      writeJustificationApi(eventId, session.nom, texte);
    };
  });

  document.querySelectorAll("[data-justif-edit]").forEach(btn => {
    btn.onclick = (e) => {
      vibrate();
      const eventId = e.currentTarget.dataset.justifEdit;
      window.__justifEditing = window.__justifEditing || {};
      window.__justifEditing[eventId] = true;
      render();
    };
  });

  document.querySelectorAll("[data-poste-edit-index]").forEach(el => {
    el.onclick = () => {
      vibrate();
      window.__profilPosteEditIndex = parseInt(el.dataset.posteEditIndex, 10);
      render();
    };
  });

  document.querySelectorAll("[data-poste-save-index]").forEach(el => {
    el.onclick = () => {
      const i = parseInt(el.dataset.posteSaveIndex, 10);
      const newVal = document.getElementById(`profil-poste-edit-${i}`).value;
      const postes = currentPostes();
      if (newVal) postes[i] = newVal;
      window.__profilPosteEditIndex = null;
      setPosteApi(session.nom, postes.join(","));
    };
  });

  document.querySelectorAll("[data-poste-remove-index]").forEach(el => {
    el.onclick = () => {
      if (!confirm("Supprimer ce poste ?")) return;
      const i = parseInt(el.dataset.posteRemoveIndex, 10);
      const postes = currentPostes();
      postes.splice(i, 1);
      setPosteApi(session.nom, postes.join(","));
    };
  });

  const posteAddToggle = document.getElementById("profil-poste-add-toggle");
  if (posteAddToggle) posteAddToggle.onclick = () => { window.__profilPosteAdding = true; render(); };

  const posteAddSubmit = document.getElementById("profil-poste-add-submit");
  if (posteAddSubmit) posteAddSubmit.onclick = () => {
    const newVal = document.getElementById("profil-poste-new").value;
    window.__profilPosteAdding = false;
    if (!newVal) { render(); return; }
    const postes = currentPostes();
    postes.push(newVal);
    setPosteApi(session.nom, postes.join(","));
  };

function exportCSV() {
  let rows = [["Action", "Valeur (€)", ...PLAYERS, "TOTAL Action (€)"]];
  ACTIONS.forEach((a, i) => {
    rows.push([a[0], a[1], ...PLAYERS.map(p => (grid[p] && grid[p][i]) || 0), actionRowTotal(i)]);
  });
  rows.push(["TOTAL Joueur (€)", "", ...PLAYERS.map(p => playerTotal(p)), grandTotal()]);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(";")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "caisse_noire_export.csv";
  a.click();
  URL.revokeObjectURL(url);
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});

}

document.addEventListener("click", (e) => {

async function fetchLoginNoms() {
  try {
    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=listNoms`);
    const data = await res.json();
    if (data.ok) {
      loginNoms = data.noms;
      if (!session) render();
    }
  } catch (err) { /* reste sur la liste figée en cas d'échec */ }
}

if (session) startPolling();
