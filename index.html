          <option value="Bénévole" ${effectiveType === "Bénévole" ? "selected" : ""}>Bénévole</option>
          <option value="Autre" ${effectiveType === "Autre" ? "selected" : ""}>Autre</option>
        </select>
        ${isMatchType ? `
        <label class="field-label">Équipe 1</label>
        <input type="text" value="Bischo" disabled style="opacity:0.6;" />
        <label class="field-label">Adversaire</label>
        <input id="ev-adversaire" type="text" placeholder="ex: Illkirch" />
        ` : `
        <label class="field-label">Titre</label>
        <input id="ev-titre" type="text" placeholder="ex: Repas d'équipe" />
        `}
        <label class="field-label">Lieu</label>
        <input id="ev-lieu" type="text" value="Lustucru Arena" />
        ${(hasRole("Admin")) ? `<label class="field-label">Équipe</label>
        <select id="ev-equipe">
          ${TEAMS.map(t => `<option value="${t}" ${activeTeam === t ? "selected" : ""}>${t}</option>`).join("")}
          <option value="Toutes" ${activeTeam === "Toutes" ? "selected" : ""}>Toutes (club entier)</option>
        </select>` : ""}
        <button class="btn" id="submit-add-event" style="margin-top:4px;">Enregistrer l'événement</button>
      </div>`;
    }
  }

  html += renderTeamSwitcher(switcherTeams, activeTeam, "agenda-team");

  html += renderCalendarExportCard();

  if (hasRole("Admin") && activeTeam !== "Toutes") {
    html += `<button class="add-toggle" id="toggle-generate-trainings" style="border-style:solid; color:#e4e8f2;">📅 ${window.__showGenerateTrainings ? "− Fermer" : "Générer les entraînements (mar/jeu)"}</button>`;
    if (window.__showGenerateTrainings) html += renderGenerateTrainingsForm(activeTeam);
  }

  const sorted = sortedEventsForTeamView(activeTeam);
  const now = new Date();
  const upcoming = sorted.filter(ev => eventDateObj(ev) >= now);
  const past = sorted.filter(ev => eventDateObj(ev) < now).reverse();

  if (upcoming.length === 0) {
    html += `<div class="section-h">À venir</div><div class="card muted">Aucun événement à venir pour le moment.</div>`;
  } else {
    let lastLabel = null;
    upcoming.forEach(ev => {
      const label = eventGroupLabel(ev);
      if (label !== lastLabel) {
        html += `<div class="section-h">${label}</div>`;
        lastLabel = label;
      }
      html += renderEventCard(ev, canManage);

  if (past.length > 0) {
    html += `<div class="section-h">Passés</div>`;
    past.slice(0, 8).forEach(ev => { html += renderEventCard(ev, canManage, true); });
  }

  return html;
}

function renderEventCard(ev, canManage, isPast) {
  const [id, date, heure, type, titre, lieu, equipe, score] = ev;
  const d = eventDateObj(ev);

  const allNames = [...PLAYERS, "Coach", "Admin", "Bénévole"];
  allNames.forEach(n => {
    const v = presenceEvenements[`${id}_${n}`];
    if (v === "Oui") presentCount++;
    else if (v === "Non") absentCount++;

  if (canManage && window.__editingEvenementId === id) {
    return `<div class="ev-card" style="display:block;">
      <label class="field-label">Date</label>
      ${dateSelectHtml(`edit-ev-date-${id}`, date || "")}
      <label class="field-label">Heure</label>

      <label class="field-label">Type</label>

      <label class="field-label">Lieu</label>
      <input id="edit-ev-lieu-${id}" type="text" value="${lieu || ''}" />

      <select id="edit-ev-equipe-${id}">
        ${TEAMS.map(t => `<option value="${t}" ${(equipe || "SM1") === t ? "selected" : ""}>${t}</option>`).join("")}
        <option value="Toutes" ${equipe === "Toutes" ? "selected" : ""}>Toutes (club entier)</option>
      </select>` : ""}
      ${type === "Match" ? (() => {
        const parts = (score || "").split("-");
        const scoreUs = parts[0] || "";
        const scoreThem = parts[1] || "";
        return `<label class="field-label">Score final (une fois le match joué)</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input id="edit-ev-score-us-${id}" type="number" min="0" placeholder="Bischo" value="${scoreUs}" style="flex:1; text-align:center;" />
          <span class="muted">—</span>
          <input id="edit-ev-score-them-${id}" type="number" min="0" placeholder="Adverse" value="${scoreThem}" style="flex:1; text-align:center;" />
        </div>`;
      })() : ""}
      <div class="row-flex" style="margin-top:10px;">
        <button class="btn" style="flex:1;" data-save-event="${id}">Enregistrer</button>
        <button class="btn secondary" style="flex:1;" data-cancel-edit-event="1">Annuler</button>
      </div>
    </div>`;
  }

  const dateFr = eventDateObj(ev).toLocaleDateString("fr-FR", { weekday: "short", day: "numeric", month: "short" });
  const heureFmt = formatHeure(ev);
  const displayTitre = typeClass(type) === "match" ? formatMatchDisplay(titre, lieu).label : (titre || "Sans titre");

  // Résultat du match (si passé et score saisi) : victoire = halo vert animé, défaite = rouge —
  // remplace l'assombrissement générique des événements passés pour ce cas précis.
  let outcomeClass = "";
  if (isPast && typeClass(type) === "match" && score) {
    const parts = String(score).split("-").map(n => parseInt(n, 10));
    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      if (parts[0] > parts[1]) outcomeClass = "ev-outcome-win";
      else if (parts[0] < parts[1]) outcomeClass = "ev-outcome-loss";
    }
  }

  return `<div class="ev-card ${outcomeClass}" style="${isPast && !outcomeClass ? 'opacity:0.55;' : ''}">    <div class="ev-date"><div class="ev-day">${d.getDate()}</div><div class="ev-month">${d.toLocaleDateString("fr-FR", { month: "short" })}</div></div>

      <div class="ev-date-full">${dateFr}${heureFmt ? " · " + heureFmt : ""}</div>
      <div class="ev-meta">${lieu || ""}${canManage ? (lieu ? " · " : "") + presentCount + " présents / " + absentCount + " absents" : ""}</div>

    </div>
    ${canManage ? `<div class="ev-actions">
      ${iconBtn(ICON_EDIT, "ev-edit", `data-edit-event="${id}"`)}
      ${iconBtn(ICON_CROSS, "ev-del", `data-delete-event="${id}"`)}

}

function renderCaisseNoireSummary() {
  const sortedPlayers = [...PLAYERS].sort((a, b) => playerTotal(b) - playerTotal(a));
  const TOP_COUNT = 5;
  const showAll = !!window.__showAllPlayers;
  const visiblePlayers = showAll ? sortedPlayers : sortedPlayers.slice(0, TOP_COUNT);
  const hasMore = sortedPlayers.length > TOP_COUNT;
  const expanded = window.__expandedPlayers || {};

  let html = `<div class="page-title">Caisse noire</div><div class="page-sub">Total et détail des actions de chaque joueur.</div>`;

  const totalPayeEquipe = paiements.reduce((s, r) => s + (parseFloat(r[2]) || 0), 0);
  const resteEquipe = grandTotal() - totalPayeEquipe;

  html += `<div class="cn-hero">
    <div class="cn-hero-label">Total équipe</div>
    <div class="cn-hero-value">${fmt(grandTotal())} €</div>
    <div class="cn-hero-sub">${fmt(totalPayeEquipe)} € déjà payé · ${fmt(resteEquipe)} € restant</div>
  </div>`;

  html += `<button class="btn add-btn-primary" id="cn-add-action">${window.__showQuickAdd ? "− Fermer" : "+ Saisir une action"}</button>`;

  if (window.__showQuickAdd) {
    html += renderQuickAddForm();
  }

  const isAdmin = hasRole("Admin");
  const FROZEN_ACTIONS = ["participation mensuelle"];

  const renderPlayerCard = (p) => {
    const total = playerTotal(p);
    const items = [];
    ACTIONS.forEach((a, i) => {
      const count = (grid[p] && grid[p][i]) || 0;
      if (count > 0) items.push({ label: a[0], count, value: count * a[1], index: i, frozen: FROZEN_ACTIONS.includes(a[0]) });
    });
    const isExpanded = !!expanded[p];
    const visibleItems = isExpanded ? items : items.slice(0, 3);
    const hiddenCount = items.length - visibleItems.length;
    const editingThis = isAdmin && window.__cnEditPlayer === p;
    const editableItems = items.filter(it => !it.frozen);

    let bubbles = visibleItems.map(it => {
      const isRetard = it.label === "Retard entraînement" || it.label === "Retard match";
      return isRetard
        ? `<span class="cn-bubble">${it.label} <span class="cn-bubble-val">${fmt(it.value)}€</span></span>`
        : `<span class="cn-bubble">${it.label} ×${it.count} <span class="cn-bubble-val">${fmt(it.value)}€</span></span>`;
    }).join("");

const POSTES = ["ALD", "ARD", "DC", "ARG", "ALG", "PV", "GB", "COACH"];

// Schéma Comptes (une ligne par personne) : Nom(0), Code(1, jamais renvoyé par le serveur),
// Roles(2, ex: "Joueur:SM1,Coach:U17,Admin:Toutes"), Poste(3), NomComplet(4), PhotoURL(5),
// Email(6), PushSubIds(7). On lit toujours les rôles d'une ligne en cherchant dans sa cellule
// "Roles", jamais via des colonnes séparées ou un regroupement par "Personne".
function parseRoles(cell) {
  return String(cell || "").split(",").map(s => s.trim()).filter(Boolean).map(pair => {
    const idx = pair.indexOf(":");
    if (idx === -1) return { role: pair, equipe: "SM1" };
    return { role: pair.slice(0, idx).trim(), equipe: pair.slice(idx + 1).trim() || "SM1" };
  });
}
function rowHasRole(row, roleName) {
  return parseRoles(row[2]).some(r => r.role === roleName);
}
function rowEquipesForRole(row, roleName) {
  return parseRoles(row[2]).filter(r => r.role === roleName).map(r => r.equipe);
}

function findCompteRow(nom) {
  return comptes.slice(1).find(c => c[0] === nom) || null;
}

function computePresenceByType(nom, equipe) {
  const relevantEvents = (equipe && equipe !== "Toutes")
    ? evenements.filter(ev => eventEquipe(ev) === equipe)
    : evenements;
  return ["Match", "Entraînement", "Repas"].map(t => {
    const evs = relevantEvents.filter(ev => (ev[3] || "") === t);
    let oui = 0, total = 0;
    evs.forEach(ev => {
      const v = presenceEvenements[`${ev[0]}_${nom}`];
      if (v === "Oui" || v === "Non") {
        total++;
        if (v === "Oui") oui++;
      }
    });
    return { type: t, pct: total > 0 ? Math.round((oui / total) * 100) : null, oui, total };
  });
}

    <div class="profil-photo-frame">${photoUrl ? `<img src="${escapeHtml(photoUrl)}" alt="Photo de ${escapeHtml(session.nom)}"/>` : getInitials(session.nom)}</div>
    ${!photoUrl ? `<div class="profil-photo-note">Photo officielle à venir — ajoutée par l'Admin</div>` : ""}
  </div></div>`;


  // Rôle dans le club + Poste, côte à côte
  html += `<div style="display:flex; gap:10px; align-items:stretch;">
    <div class="card" style="flex:1; min-width:0;">
      <div class="section-h">Rôle dans le club</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${(session.roles || []).map(r => {
          const showTeam = r.role === "Joueur" || r.role === "Coach";
          return `<span class="badge">${r.role}${showTeam ? " " + (r.equipe || "SM1") : ""}</span>`;
        }).join("")}
      </div>
    </div>
    ${canEditPoste ? `<div class="card" style="flex:1; min-width:0;">${renderPosteCard(postes, true)}</div>` : ""}
  </div>`;

  html += EMAIL_REMINDER_UI_VISIBLE ? renderEmailCard(myRow) : "";

  if (showVueToggle) {
    html += `<div class="team-switch-row">
      <button type="button" class="team-switch-btn ${vue === 'joueur' ? 'active' : ''}" data-profil-vue="joueur">Vue Joueur</button>
      <button type="button" class="team-switch-btn ${vue === 'coach' ? 'active' : ''}" data-profil-vue="coach">Vue Coach</button>
    </div>`;
  }

  if (vue === "coach") {
    const coachTeams = equipesForRole("Coach");
    const preferredCoachTeam = coachTeams[0] || primaryEquipe();
    const defaultCoachTeam = coachTeams.includes(preferredCoachTeam) ? preferredCoachTeam : (coachTeams[0] || "SM1");
    const chosenCoachTeam = (window.__profilCoachTeamView && coachTeams.includes(window.__profilCoachTeamView)) ? window.__profilCoachTeamView : defaultCoachTeam;

    if (coachTeams.length > 1) {
      html += renderTeamSwitcher(coachTeams, chosenCoachTeam, "profil-coach-team");
    }

    html += renderPtypeCard("Ta présence par type", computePresenceByType(session.nom, chosenCoachTeam));
    html += renderAverageCard(chosenCoachTeam, false);
    html += renderAverageCard(chosenCoachTeam, true);

    const mesJoueurs = comptes.slice(1).filter(c => rowHasRole(c, "Joueur") && rowEquipesForRole(c, "Joueur").indexOf(chosenCoachTeam) !== -1);
    const showAll = !!window.__profilJoueursExpanded;
    const visible = showAll ? mesJoueurs : mesJoueurs.slice(0, 4);
    html += `<div class="card">
      <div class="section-h">Mes joueurs (${mesJoueurs.length})</div>
      ${mesJoueurs.length === 0 ? `<div class="muted">Aucun joueur trouvé pour cette équipe.</div>` : visible.map(j => `
        <div class="mesjoueurs-row">
          <div class="cn-avatar" style="width:32px; height:32px; font-size:11px;">${getInitials(j[0])}</div>
          <div class="mesjoueurs-name">${j[0]}</div>
          ${j[3] ? `<span class="badge">${String(j[3]).split(",")[0]}</span>` : ""}
        </div>`).join("")}
      ${mesJoueurs.length > 4 ? `<div class="expand-toggle" data-toggle-profil-joueurs="1">${showAll ? "Réduire ▲" : "Voir les autres ▾"}</div>` : ""}
    </div>`;
  } else {
    const isJoueur = hasRole("Joueur");
    let presenceNom = session.nom, presenceEquipe = equipesForRole("Joueur")[0] || primaryEquipe();
    let presenceLabel = "Présence par type";
    const parentRole = !isJoueur ? (session.roles || []).find(r => r.role === "Parent") : null;
    if (parentRole) {
      presenceNom = parentRole.equipe; // le rôle Parent stocke le nom de l'enfant dans "equipe"
      const childRow = findCompteRow(presenceNom);
      presenceEquipe = childRow ? (rowEquipesForRole(childRow, "Joueur")[0] || presenceEquipe) : presenceEquipe;
      presenceLabel = `Présence de ${presenceNom}`;
    }
    html += renderPtypeCard(presenceLabel, computePresenceByType(presenceNom, presenceEquipe));
    if (isJoueur) html += renderStatsRecapCard(postes);
    if (parentRole) html += renderCovoiturageHistoryCard(presenceNom);
  }

  return html;
}

// Historique du covoiturage (matchs passés) pour une personne donnée — utilisé notamment sur
// le Profil des parents, pour voir ce qui a été renseigné pour leur enfant au fil de la saison.
function renderCovoiturageHistoryCard(nom) {
  const now = new Date();
  const entries = covoiturage.filter(r => r[1] === nom).map(r => {
    const ev = evenements.find(e => e[0] === r[0]);
    return ev ? { ev, jeConduit: r[2], besoinPlace: r[4] } : null;
  }).filter(Boolean).filter(x => eventDateObj(x.ev) < now).sort((a, b) => eventDateObj(b.ev) - eventDateObj(a.ev));

  let html = `<div class="card"><div class="section-h" style="margin-top:0;">Historique covoiturage</div>`;
  if (entries.length === 0) {
    html += `<div class="muted">Aucun historique pour le moment.</div>`;
  } else {
    entries.slice(0, 8).forEach(({ ev, jeConduit, besoinPlace }) => {
      const d = eventDateObj(ev);
      const dateLabel = d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short" }).replace(".", "").toUpperCase();
      const statut = jeConduit === "Oui" ? "🚗 A conduit" : (besoinPlace === "Oui" ? "🙋 A eu besoin d'une place" : "—");
      html += `<div class="paiement-row"><div>${dateLabel} — ${escapeHtml(ev[4] || "Match")}</div><div class="muted" style="font-size:11px;">${statut}</div></div>`;
    });
  }
  html += `</div>`;
  return html;
}

const ACTU_SCOPES = ["Générale", ...TEAMS];

function visibleActualites() {
  let list = actualites;
  if (!hasRole("Admin") && !hasRole("Salarié") && !hasRole("Ostéo")) {
    list = list.filter(a => a[2] === "Générale" || a[2] === (primaryEquipe()));
  }
  return list.slice().sort((a, b) => String(b[5] || "").localeCompare(String(a[5] || "")));
}

function scopesForActuCreation() {
  if (hasRole("Admin")) return ACTU_SCOPES;
  if (hasRole("Coach")) return equipesForRole("Coach").length ? equipesForRole("Coach") : [primaryEquipe()];
  return [];
}

function actuFilterOptions() {
  if (hasRole("Admin") || hasRole("Salarié") || hasRole("Ostéo")) return ["Générale", ...TEAMS];
  return ["Générale", primaryEquipe()];
}

function salariesFileIconPath(type) {
  const paths = {

    image: '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5-5 5-3-3-5 5"/>',

          <div class="row-flex">
            <button class="btn" style="flex:1;" data-save-paiement="${id}">Enregistrer</button>
            <button class="btn secondary" style="flex:1;" data-cancel-edit-paiement="1">Annuler</button>
          </div>
        </div>`;
      } else {
        html += `<div class="paiement-row">
          <div>${joueur} ${commentaire ? `<span class="muted">(${commentaire})</span>` : ""}</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="muted">${fmt(parseFloat(montant))} € · ${date}</span>
            ${iconBtn(ICON_EDIT, "ev-edit", `data-edit-paiement="${id}"`)}
            ${iconBtn(ICON_CROSS, "ev-del", `data-delete-paiement="${id}"`)}
          </div>
        </div>`;
      }
    });
    html += `</div>`;
  }

  return html;
}

function vibrate() {
  if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
}

// Retour visuel immédiat au toucher, indépendant du rafraîchissement de la page
// (le CSS :active seul n'a pas toujours le temps de s'afficher avant le re-rendu)
const TAP_SELECTOR = ".btn, .nav-btn, .toggle-btn, .ev-edit, .ev-del, .bottom-nav button, .expand-toggle, .avatar-btn, .avatar-menu-item, .qty-btn, .add-toggle, .justif-edit-btn, .team-switch-btn, .cn-edit-pick-row, .cn-edit-cancel, .folder-card, .salaries-type-btn";
document.addEventListener("touchstart", (e) => {
  const el = e.target.closest(TAP_SELECTOR);
  if (el) el.classList.add("tap-active");
}, { passive: true });
["touchend", "touchcancel"].forEach(evt => {
  document.addEventListener(evt, () => {
    document.querySelectorAll(".tap-active").forEach(el => el.classList.remove("tap-active"));
  }, { passive: true });
});

function exportCSV() {
  let rows = [["Action", "Valeur (€)", ...PLAYERS, "TOTAL Action (€)"]];
  ACTIONS.forEach((a, i) => {
    rows.push([a[0], a[1], ...PLAYERS.map(p => (grid[p] && grid[p][i]) || 0), actionRowTotal(i)]);
  });
  rows.push(["TOTAL Joueur (€)", "", ...PLAYERS.map(p => playerTotal(p)), grandTotal()]);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(";")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "caisse_noire_export.csv";
  a.click();
  URL.revokeObjectURL(url);
}

async function fetchLoginNoms(retriesLeft = 2) {
  try {
    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=listNoms`);
    const data = await res.json();
    if (data.ok) {
      loginNoms = data.noms;
      if (!session) render();
    } else if (retriesLeft > 0) {
      setTimeout(() => fetchLoginNoms(retriesLeft - 1), 1500);
    }
  } catch (err) {
    // Le premier appel à Apps Script peut être lent à démarrer ("cold start") — on retente
    // avant d'abandonner sur la liste figée, pour ne pas rester bloqué sur une liste au hasard.
    if (retriesLeft > 0) setTimeout(() => fetchLoginNoms(retriesLeft - 1), 1500);
  }
}

grid = initGrid();
render();
if (session) startPolling();
else {
  fetchLoginNoms();
  // Un utilisateur déjà mémorisé sur cet appareil a forcément déjà défini son code par le
  // passé : pas besoin d'attendre un aller-retour serveur pour savoir s'il faut lui montrer
  // le champ code — on l'affiche tout de suite, ce qui accélère nettement l'écran de connexion.
  if (loginSelectedNom && loginPrefilledFromMemory) {
    loginNeedsSetup = false;
    render();
  } else if (loginSelectedNom) {
    checkAccountStatus(loginSelectedNom);
  }
}

// ===================== TIRER POUR RAFRAÎCHIR (pull-to-refresh) =====================
let ptrStartY = null, ptrDiff = 0, ptrActive = false, ptrRefreshing = false;
const PTR_THRESHOLD = 65;

function initPullToRefresh() {
  const indicator = document.createElement("div");
  indicator.id = "ptr-indicator";
  indicator.className = "ptr-indicator";
  indicator.innerHTML = '<div class="ptr-spinner"></div>';
  document.body.appendChild(indicator);

  document.addEventListener("touchstart", (e) => {
    if (ptrRefreshing) return;
    if (window.scrollY <= 0 && !isFormOpen()) {
      ptrStartY = e.touches[0].clientY;
      ptrActive = true;
    } else {
      ptrActive = false;
    }
  }, { passive: true });

  document.addEventListener("touchmove", (e) => {
    if (!ptrActive || ptrStartY === null || ptrRefreshing) return;
    ptrDiff = e.touches[0].clientY - ptrStartY;
    if (ptrDiff > 0 && window.scrollY <= 0) {
      const pull = Math.min(ptrDiff, 100);
      indicator.style.opacity = String(Math.min(pull / PTR_THRESHOLD, 1));
      indicator.style.transform = `translateX(-50%) translateY(${Math.min(pull, PTR_THRESHOLD)}px)`;
      if (pull > 8 && e.cancelable) e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener("touchend", () => {
    if (!ptrActive) return;
    ptrActive = false;
    if (ptrDiff > PTR_THRESHOLD && !ptrRefreshing) {
      ptrRefreshing = true;
      indicator.classList.add("ptr-spinning");
      indicator.style.opacity = "1";
      indicator.style.transform = "translateX(-50%) translateY(65px)";
      Promise.resolve(fetchAll()).finally(() => {
        ptrRefreshing = false;
        indicator.classList.remove("ptr-spinning");
        indicator.style.opacity = "0";
        indicator.style.transform = "translateX(-50%) translateY(0px)";
      });
    } else {
      indicator.style.opacity = "0";
      indicator.style.transform = "translateX(-50%) translateY(0px)";
    }
    ptrDiff = 0;
  });
}
initPullToRefresh();
